 # Railroad charter decisions
 nc_charter_wilmington_weldon: "Charter Wilmington & Weldon Railroad"
 nc_charter_wilmington_weldon_desc: "Underwrite the coastal trunk from Wilmington to Weldon — nearly 160 miles, once the world's longest railroad. Requires £150,000 in gold reserves. Queues a full railway push to level 8 and a construction bonus."
 nc_charter_wilmington_weldon_tt: "Queues enough #b Railway#! levels to reach level 8 (only the missing levels), applies a #b 1-year#! #b Railroad Under Construction#! bonus, and grants the full 2-year line bonus on completion."
 nc_charter_wilmington_weldon_private_tt: "Private funding queues at most #b 4 Railway#! levels toward level 8, applies a #b 1-year#! #b Railroad Under Construction#! bonus, and grants only the weaker 2-year private line bonus on completion."
 nc_charter_raleigh_gaston: "Charter Raleigh & Gaston Railroad"
 nc_charter_raleigh_gaston_desc: "Fund the shorter ~85-mile spur from Gaston on the Roanoke to Raleigh. Requires £75,000 in gold reserves. Cheaper than the coastal trunk, with a light construction push."
 nc_charter_raleigh_gaston_tt: "Queues enough #b Railway#! levels to reach level 10 (only the missing levels), applies a #b 1-year#! #b Railroad Under Construction#! bonus, and grants the full 2-year line bonus on completion."
 nc_charter_raleigh_gaston_private_tt: "Private funding queues at most #b 1 Railway#! level toward level 10, applies a #b 1-year#! #b Railroad Under Construction#! bonus, and grants only the weaker 2-year private line bonus on completion."
 nc_charter_ncr_trunk: "Charter North Carolina Railroad"
 nc_charter_ncr_trunk_desc: "Commit the state to the great Piedmont trunk — over 220 miles from Goldsboro through Raleigh and Greensboro to Charlotte. Requires £175,000 in gold reserves."
 nc_charter_ncr_trunk_tt: "Queues enough #b Railway#! levels to reach level 13 (only the missing levels), applies a #b 1-year#! #b Railroad Under Construction#! bonus, and grants the full 2-year line bonus on completion."
 nc_charter_ncr_trunk_private_tt: "Private funding queues at most #b 2 Railway#! levels toward level 13, applies a #b 1-year#! #b Railroad Under Construction#! bonus, and grants only the weaker 2-year private line bonus on completion."
 nc_charter_atlantic_nc: "Charter Atlantic & North Carolina Railroad"
 nc_charter_atlantic_nc_desc: "Build the 'Old Mullet Road' from Goldsboro east to Morehead City and Beaufort Harbor — a coastal outlet for the Piedmont trunk. Requires £125,000 in gold reserves."
 nc_charter_atlantic_nc_tt: "Queues enough #b Railway#! levels to reach level 16 (only the missing levels), applies a #b 1-year#! #b Railroad Under Construction#! bonus, and grants the full 2-year line bonus on completion."
 nc_charter_atlantic_nc_private_tt: "Private funding queues at most #b 2 Railway#! levels toward level 16, applies a #b 1-year#! #b Railroad Under Construction#! bonus, and grants only the weaker 2-year private line bonus on completion."
 nc_charter_western_nc: "Charter Western North Carolina Railroad"
 nc_charter_western_nc_desc: "Drive the mountain railroad through the Blue Ridge toward Asheville — tunnels, trestles, and the costliest charter in the Carolina system. Requires £250,000 in gold reserves."
 nc_charter_western_nc_tt: "Queues enough #b Railway#! levels to reach level 20 (only the missing levels), applies a #b 1-year#! #b Railroad Under Construction#! bonus, and grants the full 2-year line bonus on completion."
