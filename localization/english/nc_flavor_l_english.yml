l_english:

 # === Journal entry group ===

 je_group_nc_flavor: "North Carolina"
 je_group_nc_flavor_desc: "From gold in the Piedmont creeks to tar in the coastal pines, North Carolina's landscape shaped its people and its industry throughout the nineteenth century."

 # === Journal entries ===

 je_nc_atlantic_nc: "Atlantic & North Carolina Railroad"
 je_nc_atlantic_nc_desc: "With the Piedmont trunk in place, Goldsboro still needs a deep-water outlet. The Atlantic & North Carolina — the 'Old Mullet Road' — will run about 95 miles east to Morehead City and Beaufort Harbor. Charter it via #b Decisions#! or a charter event, then expand #b Railways#! to level 16."
 je_nc_atlantic_nc_reason: "Charter the Atlantic & North Carolina (Decision or event), then build Railways to level 16."
 je_nc_atlantic_nc_building_status_loc: "The Atlantic & North Carolina is chartered and under construction. Expand #b Railways#! in North Carolina to level 16."
 je_nc_atlantic_nc_charter_tt: "Chartered the Atlantic & North Carolina Railroad"
 je_nc_atlantic_nc_progress_status_loc: "Open Decisions and take #b Charter Atlantic & North Carolina Railroad#! — or answer the matching charter event — to begin construction."
 je_nc_atlantic_nc_rails_tt: "North Carolina has at least 16 levels of Railways"

 je_nc_biltmore: "Raise the Biltmore House"
 je_nc_biltmore_desc: "George Washington Vanderbilt II has begun assembling a vast estate in the Blue Ridge near Asheville. Support — or merely permit — the construction of Biltmore House, destined to open at Christmas 1895 as America's grandest private residence."
 je_nc_biltmore_reason: "A Vanderbilt fortune is reshaping the Blue Ridge near Asheville. Whether the state aids the project or not, Biltmore House will define western North Carolina's Gilded Age."
 je_nc_biltmore_tt: "Biltmore House has been completed in North Carolina"

 je_nc_build_light_bodie_status_loc: "Bodie Island Lighthouse is under construction in North Carolina."
 je_nc_build_light_cape_fear_status_loc: "Cape Fear Lighthouse is under construction in North Carolina."
 je_nc_build_light_currituck_status_loc: "Currituck Beach Lighthouse is under construction in North Carolina."
 je_nc_build_light_lookout_status_loc: "Cape Lookout Lighthouse is under construction in North Carolina."

 je_nc_build_selected_lighthouse: "Raise the Selected Lighthouse"
 je_nc_build_selected_lighthouse_desc: "The Lighthouse Board has authorized one new Outer Banks light and queued its construction. It finishes before another may be chosen."
 je_nc_build_selected_lighthouse_reason: "Wait for the lighthouse you unlocked to finish building."
 je_nc_build_selected_lighthouse_tt: "The selected Outer Banks lighthouse has been founded"
 je_nc_build_selected_lighthouse_progress_status_loc: "Construction of the selected Outer Banks lighthouse is underway."

 je_nc_cape_fear_ports: "Cape Fear and Crystal Coast"
 je_nc_cape_fear_ports_desc: "Wilmington on the Cape Fear and Morehead City on the Crystal Coast can become soft hubs of Carolina trade. Fund harbor and terminal works via Decisions, expand Ports, and knit naval stores and rail termini into Atlantic commerce."
 je_nc_cape_fear_ports_reason: "Unlocks after the Wilmington & Weldon, Atlantic & NC, or Naval Stores program. Fund both coastal hubs and grow Ports to level 3."
 je_nc_cape_fear_ports_level_tt: "North Carolina has at least 3 levels of Ports"
 je_nc_cape_fear_ports_morehead_tt: "Funded Morehead City / Beaufort terminal works"
 je_nc_cape_fear_ports_progress_status_loc: "Open Decisions to #b Fund Wilmington Harbor#! and #b Fund Morehead Terminal#!, and expand Ports to level 3."
 je_nc_cape_fear_ports_ready_status_loc: "Harbor and terminal works are funded and ports are ready — finish the coastal hub program."
 je_nc_cape_fear_ports_wilmington_tt: "Funded Wilmington Harbor works"

 je_nc_carolina_brands: "Carolina Brands"
 je_nc_carolina_brands_desc: "North Carolina's factories and pharmacies are ready to become household names. Charter Pepsi-Cola, Vick Chemical, Hanes, and the North Carolina Railroad Company — use Decisions to sponsor New Bern soft drinks, a Greensboro pharmacy, or Winston hosiery while you grow the industries they need. The railroad company unlocks after the Piedmont NCR trunk is finished."
 je_nc_carolina_brands_reason: "Shown after Tar Heel Legacy with Corporate Charters. Activates so you can sponsor brands; completes when Pepsi-Cola, Vick Chemical, Hanes, and the NC Railroad Company are all founded."
 je_nc_carolina_brands_hanes_tt: "Hanes has been established as a company"
 je_nc_carolina_brands_ncr_tt: "The North Carolina Railroad Company has been established (unlocks after the Piedmont NCR trunk JE)"
 je_nc_carolina_brands_pepsi_tt: "Pepsi-Cola has been established as a company"
 je_nc_carolina_brands_progress_status_loc: "Found Pepsi-Cola, Vick Chemical, Hanes, and the North Carolina Railroad Company. Sponsors help industries grow; NCR needs the Piedmont trunk complete first."
 je_nc_carolina_brands_vicks_tt: "Vick Chemical has been established as a company"

 je_nc_duke_power: "Light the Piedmont"
 je_nc_duke_power_desc: "James B. Duke's Southern Power Company aims to dam the Catawba and electrify the mill belt. Raise power plants and feed Piedmont industry until the grid runs on hydroelectric current. Chartering Duke Power remains optional."
 je_nc_duke_power_reason: "Shown after Tar Heel Legacy with Electrical Generation. Activates once North Carolina has a power plant — finish the grid with plants and industry."
 je_nc_duke_power_industry_tt: "North Carolina has substantial textile mills or furniture manufactories"
 je_nc_duke_power_plants_tt: "North Carolina has at least 5 levels of Power Plants"
 je_nc_duke_power_company_tt: "Duke Power has been established as a company"
 je_nc_duke_power_start_tt: "North Carolina has at least 1 level of Power Plants"
 je_nc_duke_power_progress_status_loc: "Build Power Plants to level 5 and keep Piedmont textile mills or furniture manufactories strong."

 je_nc_found_selected_app_state_status_loc: "Build #b Appalachian State University#! in North Carolina."
 je_nc_found_selected_asheville_status_loc: "Build #b UNC Asheville#! in North Carolina."
 je_nc_found_selected_charlotte_status_loc: "Build #b UNC Charlotte#! in North Carolina."
 je_nc_found_selected_ecsu_status_loc: "Build #b Elizabeth City State University#! in North Carolina."
 je_nc_found_selected_ecu_status_loc: "Build #b East Carolina University#! in North Carolina."
