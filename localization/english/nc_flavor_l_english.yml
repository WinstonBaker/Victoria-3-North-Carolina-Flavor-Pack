 # Lighthouse decisions
 nc_authorize_cape_lookout_lighthouse: "Authorize Cape Lookout Lighthouse"
 nc_authorize_cape_lookout_lighthouse_desc: "Commission a new light on Lookout Shoals to guide coastal shipping past the southern Outer Banks."
 nc_authorize_cape_lookout_tt: "Construction of #b Cape Lookout Lighthouse#! is now available in North Carolina."
 nc_authorize_bodie_island_lighthouse: "Authorize Bodie Island Lighthouse"
 nc_authorize_bodie_island_lighthouse_desc: "Fund a modern kerosene-era light on Bodie Island to close a dark gap in the Banks."
 nc_authorize_bodie_island_tt: "Construction of #b Bodie Island Lighthouse#! is now available in North Carolina."
 nc_authorize_currituck_beach_lighthouse: "Authorize Currituck Beach Lighthouse"
 nc_authorize_currituck_beach_lighthouse_desc: "Raise an unpainted brick tower at Currituck Beach, completing the northern Outer Banks light chain."
 nc_authorize_currituck_beach_tt: "Construction of #b Currituck Beach Lighthouse#! is now available in North Carolina."
 nc_authorize_cape_fear_lighthouse: "Authorize Cape Fear Lighthouse"
 nc_authorize_cape_fear_lighthouse_desc: "Build a modern electric-era light for Frying Pan Shoals and the Cape Fear approaches."
