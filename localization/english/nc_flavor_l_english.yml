 # === Decisions ===

 nc_charter_atlantic_nc: "Charter Atlantic & North Carolina Railroad"
 nc_charter_atlantic_nc_desc: "Build the 'Old Mullet Road' from Goldsboro east to Morehead City and Beaufort Harbor — a coastal outlet for the Piedmont trunk. Requires £125,000 in gold reserves."
 nc_charter_ncr_trunk: "Charter North Carolina Railroad"
 nc_charter_ncr_trunk_desc: "Commit the state to the great Piedmont trunk — over 220 miles from Goldsboro through Raleigh and Greensboro to Charlotte. Requires £175,000 in gold reserves."
 nc_charter_raleigh_gaston: "Charter Raleigh & Gaston Railroad"
 nc_charter_raleigh_gaston_desc: "Fund the shorter ~85-mile spur from Gaston on the Roanoke to Raleigh. Requires £75,000 in gold reserves. Cheaper than the coastal trunk, with a light construction push."
 nc_charter_western_nc: "Charter Western North Carolina Railroad"
 nc_charter_western_nc_desc: "Drive the mountain railroad through the Blue Ridge toward Asheville — tunnels, trestles, and the costliest charter in the Carolina system. Requires £250,000 in gold reserves."
 nc_charter_wilmington_weldon: "Charter Wilmington & Weldon Railroad"
 nc_charter_wilmington_weldon_desc: "Underwrite the coastal trunk from Wilmington to Weldon — nearly 160 miles, once the world's longest railroad. Requires £150,000 in gold reserves. Queues a full railway push to level 8 and a construction bonus."
 nc_choose_next_lighthouse: "Choose Next Lighthouse"
 nc_choose_next_lighthouse_desc: "Select the next Outer Banks lighthouse. Requires at least one eligible light technology. Construction queues automatically; you cannot unlock another until it finishes."
 nc_choose_next_university: "Choose Next University"
 nc_choose_next_university_desc: "Charter another campus if you have a free slot. Construction begins automatically when you select a school."
 nc_expand_university_board: "Expand the University Board"
 nc_expand_university_board_desc: "Enlarge the state university board so North Carolina may charter #b two campuses at once#!. Costs treasury and temporarily reduces authority."
 nc_fund_coastal_reconstruction: "Fund Coastal Reconstruction"
 nc_fund_coastal_reconstruction_desc: "Repair storm-torn wharves and clear wreck lanes. Clears active storm or wreck damage and grants modest timed recovery bonuses — not an upgrade over calm seas."
 nc_fund_dismal_canal: "Fund the Dismal Swamp Canal"
 nc_fund_dismal_canal_desc: "Spend state funds on canal cuts, locks, and timber roads through the Great Dismal Swamp so naval stores reach Wilmington and the Sounds."
 nc_fund_freedmen_schools: "Fund Freedmen's Schools"
 nc_fund_freedmen_schools_desc: "Support schools and literacy work for freedpeople across North Carolina. Costs treasury, boosts education access, and angers Landowners who fear the new order."
 nc_fund_kitty_hawk: "Fund Kitty Hawk Experiments"
 nc_fund_kitty_hawk_desc: "Underwrite the Wright camp at Kill Devil Hills — sheds, rails, and instruments against Outer Banks wind. Costs treasury and grants innovation while you wait for flight."
 nc_fund_morehead_terminal: "Fund Morehead Terminal"
 nc_fund_morehead_terminal_desc: "Build out Morehead City and Beaufort Harbor as the Mullet Road's deep-water outlet. Costs treasury and boosts port throughput and trade capacity."
 nc_fund_wilmington_harbor: "Fund Wilmington Harbor"
 nc_fund_wilmington_harbor_desc: "Deepen Cape Fear approaches, wharves, and warehouse yards at Wilmington. Costs treasury and boosts ports, trade, and naval-stores synergy."
 nc_greensboro_pharmacy: "Sponsor Greensboro Pharmacy"
 nc_greensboro_pharmacy_desc: "Fund a Greensboro drugstore's medicinal balm research. Costs treasury and boosts chemicals — expand Chemical Plants to level 3+ before chartering Vick Chemical."
 nc_new_bern_soft_drink: "Sponsor New Bern Soft Drink"
 nc_new_bern_soft_drink_desc: "Back Caleb Bradham's pharmacy soda experiments in New Bern. Costs treasury and boosts food industry — expand Food Industry to level 5+ before chartering Pepsi-Cola."
 nc_rebuild_cape_hatteras: "Rebuild Cape Hatteras Lighthouse"
 nc_rebuild_cape_hatteras_desc: "Replace the aging 1803 sandstone tower with a taller brick lighthouse — historically completed in 1870 — to better mark Diamond Shoals."
 nc_relocate_wake_forest: "Relocate Wake Forest"
 nc_relocate_wake_forest_desc: "Tobacco wealth and Piedmont industry pull Wake Forest College toward Winston-Salem. Moving elevates it to university status — but Baptist traditionalists resent abandoning the old campus. Available after railways, once Piedmont tobacco grows, the Research Triangle is complete, or mid-century arrives."
 nc_sponsor_durham_tobacco: "Sponsor Durham Tobacco"
 nc_sponsor_durham_tobacco_desc: "Back Washington Duke's packing sheds and cigarette works in Durham. Costs treasury and boosts tobacco toward a W. Duke, Sons & Co. charter."
 nc_sponsor_liggett_myers: "Sponsor Liggett & Myers"
 nc_sponsor_liggett_myers_desc: "Support Durham's Liggett & Myers rival house. Costs treasury and boosts tobacco toward a Liggett & Myers charter."
 nc_sponsor_winston_tobacco: "Sponsor Winston Tobacco"
 nc_sponsor_winston_tobacco_desc: "Underwrite R.J. Reynolds' Winston factories. Costs treasury and boosts tobacco and food industry toward a Reynolds charter."
 nc_sponsor_cannon_mills: "Sponsor Cannon Mills"
 nc_sponsor_cannon_mills_desc: "Back James W. Cannon's Concord towel and sheet works. Costs treasury and boosts textiles toward a Cannon Mills charter."
 nc_sponsor_cone_mills: "Sponsor Cone Mills"
 nc_sponsor_cone_mills_desc: "Support the Cone brothers' Greensboro denim mills. Costs treasury and boosts textiles and cotton toward a Cone Mills charter."
 nc_sponsor_burlington: "Sponsor Burlington Industries"
 nc_sponsor_burlington_desc: "Underwrite a Piedmont textile conglomerate linking mills, cotton, and timber. Costs treasury and boosts industry toward a Burlington charter."
 nc_sponsor_high_point: "Sponsor High Point Furniture"
 nc_sponsor_high_point_desc: "Back High Point's furniture manufactories and hardwood trade. Costs treasury and boosts furniture toward a High Point Furniture charter."
 nc_start_lighthouse_program: "Fund the Lighthouse Board"
 nc_start_lighthouse_program_desc: "Open the Outer Banks lighthouse program. After funding, choose new beacons one at a time as their technologies are researched."
 nc_university_construction_push: "University Construction Push"
 nc_university_construction_push_desc: "Spend state funds to accelerate construction while chartered campuses are rising."
 nc_winston_hosiery: "Sponsor Winston Hosiery"
 nc_winston_hosiery_desc: "Support knitting mills in Winston that specialize in hosiery and underwear. Costs treasury and boosts textiles — expand Textile Mills to level 4+ before chartering Hanes."

 # === Events ===

 nc_flavor_events.1.a: "Invest heavily to expand the diggings."
 nc_flavor_events.1.b: "Tax the existing mines and leave expansion to private capital."
 nc_flavor_events.1.d: "Since Conrad Reed's discovery in 1799, gold has been dug from the Piedmont creeks and hills of Cabarrus and Mecklenburg. Shafts around Charlotte are still yielding, and mine owners press for capital to sink deeper works and draw more labor into the Carolina Gold Belt."
 nc_flavor_events.1.f: "'The rush began before the century turned. The question now is how far we will push it.'"
 nc_flavor_events.1.t: "Deepening the Carolina Gold Belt"

 nc_flavor_events.2.a: "Fund statewide promotion of the new technique."
 nc_flavor_events.2.b: "Let the planter class lead the transition."
 nc_flavor_events.2.d: "Planters in the Piedmont have begun curing tobacco with controlled heat rather than wood smoke. The resulting bright, yellow leaf fetches far higher prices in English and continental markets than the dark tobacco of old."
 nc_flavor_events.2.f: "'Fire cured the old way. Flues cure the future.'"
 nc_flavor_events.2.t: "The Brightleaf Cure"

 nc_flavor_events.4.a: "A proud day for the Old North State."
 nc_flavor_events.4.d: "North Carolina has emerged as a model of the New South — its tobacco fields productive, its pine forests yielding naval stores, and its ports carrying goods to every corner of the nation. The Tar Heel State has earned its place among the industrial powers of America."
 nc_flavor_events.4.f: "'From Murphy to Manteo, Carolina leads the way.'"
 nc_flavor_events.4.t: "First in Freedom, First in Industry"

 nc_flavor_events.5.a: "Back the plan with state funds and land grants."
 nc_flavor_events.5.b: "Let private philanthropy and church charters lead the way."
 nc_flavor_events.5.d: "With the University of North Carolina already standing at Chapel Hill, a group of planners, professors, and Piedmont businessmen have begun sketching a bolder vision: sister institutions at Raleigh and Durham, drawing scholars and industry alike into a single corridor of learning. Fund the board now to unlock construction of NC State and Duke — scaffolds will also auto-queue in two months if you have not started them."
 nc_flavor_events.5.f: "'One university builds a town. Three universities build a region.'"
 nc_flavor_events.5.t: "Blueprints for a Triangle"

 nc_flavor_events.6.a: "Choose the next campus."
 nc_flavor_events.6.d: "North Carolina State University and Duke University now stand alongside the University of North Carolina at Chapel Hill. The Research Triangle is complete — and the next question is which campus should expand Carolina's university system first."
 nc_flavor_events.6.f: "Where once there were only scattered lecture halls and modest campuses, there now stands a corridor of laboratories, libraries, and lecture theaters, humming with the ambitions of a new generation of scholars."
 nc_flavor_events.6.t: "The Research Triangle United"

 nc_flavor_events.7.a: "Fund and staff the Charlotte Mint."
 nc_flavor_events.7.b: "Leave the mint to private contractors and take a share of the first coinage."
 nc_flavor_events.7.d: "The discovery of gold in the hills of North Carolina has transformed the state's economy. For decades, miners have extracted precious metal from the Carolina Gold Belt, only to send their fortunes away to Philadelphia for refinement and coinage. Recognizing the importance of securing this wealth at home, the United States government has authorized a branch mint in Charlotte. This new institution will bring stability to the region's growing mining industry, allowing North Carolina's gold to become a foundation of commerce rather than a resource shipped elsewhere."
 nc_flavor_events.7.f: "From the streams and hills of North Carolina comes a treasure once thought to belong only to distant lands. With the establishment of the Charlotte Mint, the gold of the Carolinas will now be transformed into coin within the state itself."
 nc_flavor_events.7.t: "The Charlotte Mint"

 nc_flavor_events.8.a: "Dedicate the building to the people of North Carolina."
 nc_flavor_events.8.d: "After years of scaffolding and stonework, the new State Capitol stands complete on Union Square. Its Greek Revival columns announce that North Carolina intends to govern itself with permanence and pride."
 nc_flavor_events.8.f: "'Built of stone, meant to last as long as the Union.'"
 nc_flavor_events.8.t: "The Capitol at Raleigh"

 nc_flavor_events.9.a: "Fund the Lighthouse Board and begin the program."
 nc_flavor_events.9.b: "Defer the program for now."
 nc_flavor_events.9.d: "Old Baldy, Ocracoke, and the sandstone Cape Hatteras tower already watch Carolina waters, but shipwrecks along the Graveyard of the Atlantic still haunt commerce. The Lighthouse Board urges a fuller program — new lights at Lookout, Bodie Island, Currituck, and eventually Cape Fear — raised one beacon at a time as technology allows."
 nc_flavor_events.9.f: "'A light on the Banks is worth a fleet in the harbor.'"
 nc_flavor_events.9.t: "Lights on the Outer Banks"

 nc_flavor_events.10.a: "Underwrite the line with state bonds."
 nc_flavor_events.10.b: "Rely on private stock subscriptions."
 nc_flavor_events.10.d: "Promoters in Wilmington propose a continuous line north to Weldon on the Roanoke — a project that, when finished, will be the longest railroad in the world. Cotton, naval stores, and passengers will race from the Cape Fear to Virginia connections in a single journey."
 nc_flavor_events.10.f: "'One hundred and sixty-one miles of iron — and the world will take notice.'"
 nc_flavor_events.10.t: "The Wilmington and Weldon Railroad"

 nc_flavor_events.11.a: "Subscribe heavily on behalf of the state."
 nc_flavor_events.11.b: "Leave the financing to private investors."
 nc_flavor_events.11.d: "With the coastal trunk underway, attention turns inland. A railroad from Gaston on the Roanoke to the capital at Raleigh will bind the Piedmont to northern markets and give the statehouse a direct iron road to the wider world."
 nc_flavor_events.11.f: "'From the Roanoke to Union Square — the capital will no longer wait on wagons.'"
 nc_flavor_events.11.t: "The Raleigh and Gaston Railroad"

 nc_flavor_events.12.a: "Commit the treasury to the North Carolina Railroad."
 nc_flavor_events.12.b: "Charter the company but keep the state's purse closed."
 nc_flavor_events.12.d: "The crowning Piedmont work: a state-backed trunk from Goldsboro through Raleigh and Greensboro to Charlotte, knitting together the Wilmington and Weldon and Raleigh and Gaston systems."
 nc_flavor_events.12.f: "'Charter the company. Lay the iron. Unite the Piedmont.'"
 nc_flavor_events.12.t: "The North Carolina Railroad"

 nc_flavor_events.13.a: "Celebrate the Carolina rail network."
 nc_flavor_events.13.d: "From Wilmington to Weldon, Gaston to Raleigh, Goldsboro to Charlotte, the Mullet Road to Morehead City, and iron through the Blue Ridge to Asheville — all five great Carolina lines stand complete. Merchants, planters, and mill owners alike toast a permanent rail network that will shape the state's economy for generations. The North Carolina Railroad Company can now be founded in earnest."
 nc_flavor_events.13.f: "'Where the rails go, Carolina follows.'"
 nc_flavor_events.13.t: "Rails Across the Old North State"

 nc_flavor_events.14.a: "Underwrite mill villages with state credit."
 nc_flavor_events.14.b: "Leave the spindles to private capital."
 nc_flavor_events.14.d: "Promoters in Concord, Gastonia, and Charlotte propose mill villages along the Piedmont fall line — brick factories, company housing, and Southern cotton spun into cloth without a northern middleman. Water power is cheap; labor is cheaper still. The only question is whether the state will underwrite the boom."
 nc_flavor_events.14.f: "'Bring the mill to the cotton — not the cotton to New England.'"
 nc_flavor_events.14.t: "Spindles on the Fall Line"

 nc_flavor_events.15.a: "Let the spindles define the age."
 nc_flavor_events.15.d: "From Charlotte through Gastonia to Concord, the mills never sleep. Whistles call the villages to work, cotton wagons crowd the sidings, and newspapers boast that North Carolina now spins what it grows. The New South has found its workshop in the Piedmont."
 nc_flavor_events.15.f: "'Where the fall line drops, Carolina rises.'"
 nc_flavor_events.15.t: "The Piedmont Textile Belt"

 nc_flavor_events.16.a: "Back Southern Power with state credit."
 nc_flavor_events.16.b: "Leave the dams to private capital."
 nc_flavor_events.16.d: "James B. Duke and the Southern Power Company propose dams and generating stations along the Catawba River. Electrified mills could run night shifts from Charlotte to Gastonia — if the state helps underwrite the grid."
 nc_flavor_events.16.f: "'Water over the dam becomes light in the mill.'"
 nc_flavor_events.16.t: "Power on the Catawba"

 nc_flavor_events.17.a: "Let the current define the New South."
 nc_flavor_events.17.d: "Transmission lines stitch the fall line together. Mill whistles answer to turbines now, and newspapers call it the age of Duke Power — Carolina industry running on mountain water and copper wire."
 nc_flavor_events.17.f: "'The river works while Carolina sleeps.'"
 nc_flavor_events.17.t: "The Piedmont Goes Electric"

 nc_flavor_events.18.a: "Underwrite the furniture factories."
 nc_flavor_events.18.b: "Leave High Point to private makers."
 nc_flavor_events.18.d: "High Point's boosters claim the town can furnish America. Hardwood from the surrounding hills, rail connections, and skilled joiners make a furniture boom possible — if capital follows the sawdust."
 nc_flavor_events.18.f: "'From stump to showroom — all in Carolina.'"
 nc_flavor_events.18.t: "Chairs from the Piedmont"

 nc_flavor_events.19.a: "Celebrate the capital of woodwork."
 nc_flavor_events.19.d: "Showrooms crowd High Point. Buyers from New York and Chicago walk floors of Carolina oak and walnut, and the town's name becomes shorthand for American furniture."
 nc_flavor_events.19.f: "'If it has four legs, it was made in High Point.'"
 nc_flavor_events.19.t: "Furniture Capital of the World"

 nc_flavor_events.20.a: "Subsidize roads, a rail spur, and grounds work."
 nc_flavor_events.20.b: "Wish Mr. Vanderbilt well and keep the treasury shut."
 nc_flavor_events.20.d: "George Washington Vanderbilt II has purchased thousands of acres near Asheville and engaged Richard Morris Hunt and Frederick Law Olmsted to raise an estate without equal in America. Local leaders ask whether the state will improve roads and rail access to the site — or leave the Gilded Age palace entirely to private fortune."
 nc_flavor_events.20.f: "'Not a house. A mountain kingdom of stone and garden.'"
 nc_flavor_events.20.t: "A House in the Blue Ridge"

 nc_flavor_events.21.a: "Welcome the age of the great estate."
 nc_flavor_events.21.d: "On Christmas Eve, guests fill the halls of Biltmore House. The largest private residence in America now crowns the Blue Ridge, drawing visitors, artisans, and prestige to western North Carolina."
 nc_flavor_events.21.f: "'Four acres under one roof — and the mountains for a garden.'"
 nc_flavor_events.21.t: "Christmas at Biltmore"

 nc_flavor_events.22.a: "Celebrate the miracle at Kill Devil Hills."
 nc_flavor_events.22.d: "On the Outer Banks near Kitty Hawk, Orville and Wilbur Wright have kept a powered aeroplane aloft. The dunes that wrecked so many ships have launched the age of flight — and North Carolina's name travels with every headline."
 nc_flavor_events.22.f: "'Twelve seconds that changed the sky.'"
 nc_flavor_events.22.t: "First Flight at Kill Devil Hills"

 nc_flavor_events.23.a: "Underwrite the Mullet Road with state bonds."
 nc_flavor_events.23.b: "Leave the coastal link to private capital."
 nc_flavor_events.23.d: "Goldsboro sits at the eastern end of the North Carolina Railroad, but the Piedmont still lacks a true deep-water outlet of its own. Promoters urge a line east to Morehead City and Beaufort Harbor — the Atlantic & North Carolina, soon nicknamed the Old Mullet Road for the fish cars that will ride its rails."
 nc_flavor_events.23.f: "'From the fall line to the sound — let Carolina touch the sea at Morehead.'"
 nc_flavor_events.23.t: "The Atlantic and North Carolina Railroad"

 nc_flavor_events.24.a: "Commit the treasury to the mountain railroad."
 nc_flavor_events.24.b: "Charter the company but spare the public purse."
 nc_flavor_events.24.d: "Beyond Salisbury the Blue Ridge rises like a wall. Engineers speak of tunnels, switchbacks, and trestles on the climb toward Asheville and the Tennessee connection. The Western North Carolina Railroad will be the costliest iron road the state has ever attempted — and the one that finally opens the mountains."
 nc_flavor_events.24.f: "'Through the ridge, or Carolina stops at the foothills.'"
 nc_flavor_events.24.t: "The Western North Carolina Railroad"

 nc_flavor_events.31.a: "The Old North State leads in learning."
 nc_flavor_events.31.d: "From Chapel Hill to Charlotte, Boone to Wilmington, Greensboro to Cullowhee — every campus of the Carolina University System now stands complete. Educators toast a network that will shape the state's mind and industry for generations."
 nc_flavor_events.31.f: "'From the Blue Ridge to the Cape Fear — one system, many lights.'"
 nc_flavor_events.31.t: "The Carolina University System"

 nc_flavor_events.32.app_state: "Appalachian State"
 nc_flavor_events.32.asheville: "UNC Asheville"
 nc_flavor_events.32.charlotte: "UNC Charlotte"
 nc_flavor_events.32.d: "With the Research Triangle secured, the university board may charter the next UNC System campus. Hover options to compare benefits. Selecting a school queues construction immediately. Default capacity is one charter; expand the board to run two in parallel. Mid-system rewards unlock after 7 of 14 campuses."
 nc_flavor_events.32.defer: "Decide later"
 nc_flavor_events.32.ecsu: "Elizabeth City State"
 nc_flavor_events.32.ecu: "East Carolina University"
 nc_flavor_events.32.f: "'Charter what you can staff — and build what you charter.'"
 nc_flavor_events.32.fayetteville: "Fayetteville State"
 nc_flavor_events.32.ncat: "North Carolina A&T"
 nc_flavor_events.32.nccu: "NC Central"
 nc_flavor_events.32.pembroke: "UNC Pembroke"
 nc_flavor_events.32.t: "The Next Campus"
 nc_flavor_events.32.uncg: "UNC Greensboro"
 nc_flavor_events.32.uncsa: "UNC School of the Arts"
 nc_flavor_events.32.western: "Western Carolina"
 nc_flavor_events.32.wilmington: "UNC Wilmington"
 nc_flavor_events.32.wssu: "Winston-Salem State"

 nc_flavor_events.33.bodie: "Bodie Island"
 nc_flavor_events.33.cape_fear: "Cape Fear"
 nc_flavor_events.33.currituck: "Currituck Beach"
 nc_flavor_events.33.d: "The Lighthouse Board asks which Outer Banks light should rise next. Hover each option to compare benefits. Selecting a light queues its construction automatically — only lights whose technology you have researched appear, and you may authorize only one at a time."
 nc_flavor_events.33.defer: "Decide later"
 nc_flavor_events.33.f: "'One light at a time — until the Banks are bright.'"
 nc_flavor_events.33.lookout: "Cape Lookout"
 nc_flavor_events.33.t: "The Next Beacon"

 nc_flavor_events.34.a: "A proud day for Carolina shipping."
 nc_flavor_events.34.d: "From Lookout Shoals to Currituck Beach and the Cape Fear approaches, the Outer Banks light chain is complete. Merchants toast safer passages through the Graveyard of the Atlantic, and Carolina ports stand stronger than ever."
 nc_flavor_events.34.f: "'Where wreckers once waited, beacons now burn.'"
 nc_flavor_events.34.t: "The Banks Are Lit"

 nc_flavor_events.38.a: "Endorse the Expanding University System."
 nc_flavor_events.38.d: "Seven UNC System campuses now stand beyond the Research Triangle. From teachers' colleges to HBCUs and regional universities, North Carolina's board of trustees can claim a genuine statewide network — and the legislature is ready to fund its next phase."
 nc_flavor_events.38.f: "'Seven lights kindled. Seven more to raise.'"
 nc_flavor_events.38.t: "An Expanding University System"

 nc_flavor_events.39.a: "Fund the move to Winston-Salem."
 nc_flavor_events.39.b: "Keep Wake Forest where it stands."
 nc_flavor_events.39.d: "Trustees argue that the old Baptist campus can no longer keep pace with the Piedmont. Winston-Salem's tobacco fortunes — and the industrial towns rising along the rail — offer land, endowments, and students that Wake Forest College will never see in its present seat. Moving means a true university: broader faculties, stronger migration pull, and lasting prestige. Baptist congregations and the Evangelicals, however, call it abandonment — trading a Christian college for the purse of the factory towns."
 nc_flavor_events.39.f: "'A college taught ministers. A university will teach the Piedmont — if the faithful can bear the cost.'"
 nc_flavor_events.39.t: "Wake Forest to Winston-Salem"

 nc_flavor_events.40.a: "Queue the campuses."
 nc_flavor_events.40.d: "Two months after the Triangle board secured its funding, surveyors confirm the Raleigh land-grant site and the Durham campus. Any Triangle university not yet under construction is queued now."
 nc_flavor_events.40.f: "'Raise the scaffolds. The Triangle will not wait on paper alone.'"
 nc_flavor_events.40.t: "Triangle Campuses Authorized"

 nc_flavor_events.41.a: "Let the struggle play out."
 nc_flavor_events.41.d: "Concord and Gastonia mill agents promise wages, schools, and company stores. County planters answer that spindles steal hands from the fields and turn freeholders into factory dependents. The Piedmont cannot keep both orders forever."
 nc_flavor_events.41.f: "'Pay them in scrip and preach thrift on Sunday — or leave the land to those who know tobacco.'"
 nc_flavor_events.41.t: "Smoke Over the Fall Line"

 nc_flavor_events.42.a: "Back the mill villages"
 nc_flavor_events.42.b: "Stand with the planters"
 nc_flavor_events.42.c: "Force an uneasy compromise"
 nc_flavor_events.42.d: "Mill villages now crowd the fall line, and plantation wealth still rules the countryside. Legislators, preachers, and county rings demand a settlement: paternal factory towns, a planter restoration, or a compromise that satisfies neither side completely."
 nc_flavor_events.42.f: "'Build the village — or defend the field.'"
 nc_flavor_events.42.t: "Who Owns the Piedmont?"

 nc_flavor_events.43.a: "Endorse the mill paternalists"
 nc_flavor_events.43.b: "Quietly favor the county rings"
 nc_flavor_events.43.d: "A mill superintendent cuts rents and expands the company school — then docks wages for 'store credit.' Operatives cheer the schools; planters call it bondage with a whistle."
 nc_flavor_events.43.f: "'The bell rings twice a day. The field never did.'"
 nc_flavor_events.43.t: "Company Store Politics"

 nc_flavor_events.44.a: "Protect plantation labor"
 nc_flavor_events.44.b: "Keep the mills hiring"
 nc_flavor_events.44.d: "Brightleaf factors and cotton factors circulate petitions against mill recruitment drives that empty tenant farms. They want the state to prefer leaf warehouses over another spindle hall."
 nc_flavor_events.44.f: "'Cloth can wait. The curing barns cannot.'"
 nc_flavor_events.44.t: "Leaf Before Cloth"

 nc_flavor_events.45.a: "Toast the New Bern formula"
 nc_flavor_events.45.d: "From a New Bern pharmacy counter, Caleb Bradham's cola has become Pepsi-Cola — bottled, trademarked, and shipping along the coastal plain. Soft drinks and tobacco towns suddenly share the same commercial map."
 nc_flavor_events.45.f: "'A nickel a glass — and a Carolina name on every crate.'"
 nc_flavor_events.45.t: "Brad's Drink Goes to Market"

 nc_flavor_events.46.a: "Champion the pharmacy works"
 nc_flavor_events.46.d: "Lunsford Richardson's pharmacy balm has outgrown the drugstore. Vick Chemical packages mentholated relief for a national market, and Greensboro's chemical works hum with orders."
 nc_flavor_events.46.f: "'Rub it on — and ship it west.'"
 nc_flavor_events.46.t: "VapoRub from Greensboro"

 nc_flavor_events.47.a: "Back the knitting rooms"
 nc_flavor_events.47.d: "P.H. Hanes knitting mills in Winston turn cotton into hosiery and underwear for a mass market. Mill villages and mail-order catalogs carry a Carolina brand into every strata of society."
 nc_flavor_events.47.f: "'Knit the Piedmont into every wardrobe.'"
 nc_flavor_events.47.t: "Hanes on Every Line"

 nc_flavor_events.48.a: "Celebrate the company charter"
 nc_flavor_events.48.d: "With the Carolina rail network complete, the North Carolina Railroad Company stands as a chartered pillar of the state's infrastructure — rails, motors, and the prestige of a public trunk line."
 nc_flavor_events.48.f: "'Iron paid for by the people, run for the people.'"
 nc_flavor_events.48.t: "The State's Own Railroad"

 nc_flavor_events.49.a: "Wear the Carolina brands with pride"
 nc_flavor_events.49.d: "Pepsi-Cola, Vick Chemical, Hanes, and the North Carolina Railroad Company now anchor Carolina commerce. Soft drinks, remedies, knit goods, and rails carry the state's reputation far beyond the fall line."
 nc_flavor_events.49.f: "'Four brands. One Piedmont.'"
 nc_flavor_events.49.t: "Names the Nation Knows"

 nc_flavor_events.50.a: "Push the naval stores trade"
 nc_flavor_events.50.d: "Factors in Wilmington and Norfolk still speak of Carolina tar as the navy's friend. The Sandhills and Dismal Swamp can feed that trade again — if logging camps expand and the canal cuts are paid for."
 nc_flavor_events.50.f: "'Stick a heel in the tar — and ship it before the pine is gone.'"
 nc_flavor_events.50.t: "Tar, Pitch, and Cypress"

 nc_flavor_events.51.a: "Secure the Tar Heel timber trade"
 nc_flavor_events.51.d: "Timber, tar, and turpentine move again through cypress cuts toward the Sounds. North Carolina's naval stores belt is no longer a memory — it is a working economy of pine, swamp, and coastal trade."
 nc_flavor_events.51.f: "'From the Dismal to the Cape Fear — the pines pay their freight.'"
 nc_flavor_events.51.t: "The Canal Runs Clear"

 nc_flavor_events.52.a: "Chase the cigarette fortune"
 nc_flavor_events.52.d: "Auction floors in Durham and Winston fill with golden leaf. Cigarette factories promise fortunes that leave cotton and naval stores looking old-fashioned — if the right houses can be chartered and the plantations keep curing."
 nc_flavor_events.52.f: "'Pack it bright, ship it far — and let Durham and Winston share the smoke.'"
 nc_flavor_events.52.t: "Smoke Over the Brightleaf Belt"

 nc_flavor_events.53.a: "Toast the Durham house"
 nc_flavor_events.53.d: "Washington Duke's sons have turned a packing shed into W. Duke, Sons & Co. — cigarettes rolling from Durham toward every rail town in America."
 nc_flavor_events.53.f: "'From a hillside barn to a national brand.'"
 nc_flavor_events.53.t: "Duke of Durham"

 nc_flavor_events.54.a: "Champion the Winston works"
 nc_flavor_events.54.d: "R.J. Reynolds Tobacco Company stamps Winston on crates bound west and north. Brightleaf and factory smoke redefine the western Piedmont."
 nc_flavor_events.54.f: "'Winston leaf for a nation of smokers.'"
 nc_flavor_events.54.t: "Reynolds of Winston"

 nc_flavor_events.55.a: "Welcome the rival house"
 nc_flavor_events.55.d: "Liggett & Myers stakes its claim in Durham beside the Dukes — a second giant of the cigarette age, packing chew and smoke for rival markets."
 nc_flavor_events.55.f: "'Two houses, one brightleaf belt.'"
 nc_flavor_events.55.t: "Liggett & Myers Rising"

 nc_flavor_events.56.a: "Secure the Tobacco Belt"
 nc_flavor_events.56.d: "Duke, Reynolds, and Liggett & Myers now rule Carolina tobacco. From Durham auction floors to Winston factory floors, the Tobacco Belt is complete — and Industrialists lean hard into the New South."
 nc_flavor_events.56.f: "'Three houses. One corridor of gold leaf.'"
 nc_flavor_events.56.t: "The Brightleaf Triumvirate"

 nc_flavor_events.57.a: "Back the Concord mills"
 nc_flavor_events.57.d: "Cannon Mills turns Cabarrus cotton into towels and sheets that fill company stores and northern dry-goods houses alike."
 nc_flavor_events.57.f: "'Cannon on every line — Concord in every closet.'"
 nc_flavor_events.57.t: "Towels from Concord"

 nc_flavor_events.58.a: "Champion Cone denim"
 nc_flavor_events.58.d: "Cone Mills weaves work cloth and denim for a South that is putting on overalls as fast as it builds spindles."
 nc_flavor_events.58.f: "'Blue cloth for a working Piedmont.'"
 nc_flavor_events.58.t: "Denim from Greensboro"

 nc_flavor_events.59.a: "Celebrate the conglomerate"
 nc_flavor_events.59.d: "Burlington Industries knits Alamance and Piedmont mills into one conglomerate — cotton, logging, and mill towns under a single corporate map."
 nc_flavor_events.59.f: "'One charter. A dozen mill whistles.'"
 nc_flavor_events.59.t: "Burlington's Spindle Empire"

 nc_flavor_events.60.a: "Enjoy mill-town prosperity"
 nc_flavor_events.60.d: "With more than one great textile house flying Carolina colors, mill towns hum in concert — wages, stores, and spindles reinforcing each other from Concord to Burlington."
 nc_flavor_events.60.f: "'When the whistles agree, the Piedmont prospers.'"
 nc_flavor_events.60.t: "Whistles Across the Piedmont"

 nc_flavor_events.61.a: "Open the coastal hubs"
 nc_flavor_events.61.d: "Wilmington still claims the Cape Fear, but Morehead City and Beaufort Harbor bid to share Carolina's deep-water trade. Fund both — and the pines, rails, and cigarettes will find cheaper water."
 nc_flavor_events.61.f: "'One river mouth. One sound. Two Carolina doors.'"
 nc_flavor_events.61.t: "Two Doors to the Atlantic"

 nc_flavor_events.62.a: "Secure the coastal hubs"
 nc_flavor_events.62.d: "Wilmington's Cape Fear yards and Morehead's Crystal Coast terminal now work as a pair. Naval stores, brightleaf, and Piedmont goods meet Atlantic freights under a lasting coastal program."
 nc_flavor_events.62.f: "'From Frying Pan Shoals to Beaufort Inlet — the coast pays its keep.'"
 nc_flavor_events.62.t: "Harbors of the Tar Heel Coast"

 nc_flavor_events.63.a: "Watch the dunes"
 nc_flavor_events.63.d: "Gliders skim the dunes near Kitty Hawk. Locals shrug at Ohio bicycle men — until someone suggests the state might underwrite a proper camp before the next nor'easter."
 nc_flavor_events.63.f: "'If the wind will hold a kite, it may hold a machine.'"
 nc_flavor_events.63.t: "Winds Over Kill Devil Hills"

 nc_flavor_events.64.a: "Claim the pioneer prestige"
 nc_flavor_events.64.d: "Kitty Hawk funding and the Kill Devil Hills flight together put North Carolina on every front page. The Outer Banks that wrecked ships have launched the age of aviation."
 nc_flavor_events.64.f: "'Twelve seconds — and a state's name forever.'"
 nc_flavor_events.64.t: "Carolina Claims the Sky"

 nc_flavor_events.65.a: "Open the New South debate"
 nc_flavor_events.65.d: "Occupied courthouses and empty fields leave North Carolina arguing over schools, suffrage, and spindles. Planters want the old county order; educators and mill agents want a New South — if anyone will pay for it."
 nc_flavor_events.65.f: "'Rebuild the schoolhouse — or rebuild the gin?'"
 nc_flavor_events.65.t: "After the Smoke Clears"

 nc_flavor_events.66.a: "Put literacy first"
 nc_flavor_events.66.b: "Put spindles first"
 nc_flavor_events.66.c: "Split the difference"
 nc_flavor_events.66.d: "Freedmen's schools stand, and mills or campuses have begun to reshape the Piedmont. The settlement that follows will decide whether Carolina leans toward literacy, spindles, or an uneasy share of both — feeding the politics of mill villages to come."
 nc_flavor_events.66.f: "'Not a new constitution — a new bargain.'"
 nc_flavor_events.66.t: "A New South Bargain"

 nc_flavor_events.67.a: "Back the schoolhouses"
 nc_flavor_events.67.b: "Ease the planters"
 nc_flavor_events.67.d: "Teachers ask for primers; county planters ask for field hands. Reconstruction's arguments refuse to stay in Raleigh — they spill into every mill village and tobacco barn."
 nc_flavor_events.67.f: "'Books or barns — choose whose season this is.'"
 nc_flavor_events.67.t: "Schoolhouse and Courthouse"

 nc_flavor_events.68.a: "Watch the Banks"
 nc_flavor_events.68.d: "Cape Fear's lantern joins the chain, but the Graveyard of the Atlantic is not finished with Carolina. Keep a weather eye on the Banks — storms and wrecks will still ask what the lights are worth."
 nc_flavor_events.68.f: "'Lit does not mean tame.'"
 nc_flavor_events.68.t: "After the Last Light"

 nc_flavor_events.69.a: "Ride out the storm"
 nc_flavor_events.69.b: "Rush emergency repairs"
 nc_flavor_events.69.d: "Wind piles breakers over the Outer Banks. Wharves splinter, pilots refuse the bars, and every lighthouse keeper wires for oil and relief. The coast that feeds Carolina trade can choke it overnight."
 nc_flavor_events.69.f: "'Sound the fog bell — and count the slips.'"
 nc_flavor_events.69.t: "Nor'easter on the Banks"

 nc_flavor_events.70.a: "Salvage what we can"
 nc_flavor_events.70.b: "Fund a full wreck crew"
 nc_flavor_events.70.d: "A hull fetches up on Diamond Shoals. Lighters race the tide; fishermen curse lost grounds; Hatteras keeps its watch. The Graveyard has claimed another name for the charts."
 nc_flavor_events.70.f: "'Another spar on the beach.'"
 nc_flavor_events.70.t: "Wreck on the Bar"

 nc_flavor_events.71.a: "Keep the watches lit"
 nc_flavor_events.71.d: "Treasury coin and Carolina timber put the Outer Banks back to work — piers shored, channels marked, keepers paid. The lights look sharper for the storm that tried them."
 nc_flavor_events.71.f: "'Rebuild before the next blow.'"
 nc_flavor_events.71.t: "Banks Under Repair"
 nc_flavor_events.76.a: "Celebrate the furniture charter"
 nc_flavor_events.76.d: "High Point Furniture stakes its claim as the showroom of the Piedmont — hardwood from Carolina forests turned into parlor suites for a national market."
 nc_flavor_events.76.f: "'Chairs for the continent. Timber from the Triad.'"
 nc_flavor_events.76.t: "Furniture Capital Chartered"
 nc_flavor_events.77.a: "Celebrate the power charter"
 nc_flavor_events.77.d: "Duke Power — Southern Power made permanent — now owns the Piedmont grid. Dams, coal, and night-shift mills answer to one electrified charter."
 nc_flavor_events.77.f: "'Current for the spindles. Light for the New South.'"
 nc_flavor_events.77.t: "Duke Power Chartered"

 nc_flavor_events.rail_already_chartered: "Acknowledge the existing charter."

