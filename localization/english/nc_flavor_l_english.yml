l_english:

 # Journal Entries Group
 je_group_nc_flavor: "North Carolina"
 je_group_nc_flavor_desc: "From gold in the Piedmont creeks to tar in the coastal pines, North Carolina's landscape shaped its people and its industry throughout the nineteenth century."

 # Journal Entries
 je_nc_tar_heel_legacy: "Tar Heel Legacy"
 je_nc_tar_heel_legacy_desc: "North Carolina sits at a crossroads of the Old South and the rising industrial order. Tobacco fields blanket the Piedmont, pine forests feed naval stores, and Wilmington's harbor opens the state to the Atlantic world. Develop the Tar Heel State into a powerhouse of agriculture, timber, and trade."
 je_nc_tar_heel_legacy_reason: "Tobacco, timber, and naval stores can make North Carolina a New South powerhouse — if the fields and pine forests are developed in earnest."

 je_nc_wilmington_weldon: "Wilmington & Weldon Railroad"
 je_nc_wilmington_weldon_desc: "Promoters in Wilmington propose a continuous line north to Weldon on the Roanoke — nearly 160 miles, and for a time the world's longest railroad. Charter it via #b Decisions#! or a charter event to queue a railway push. Finish by expanding #b Railways#! in North Carolina to level 8."
 je_nc_wilmington_weldon_reason: "Charter the Wilmington & Weldon (Decision or event), then build Railways in North Carolina to level 8."
 je_nc_wilmington_weldon_progress_status_loc: "Open Decisions and take #b Charter Wilmington & Weldon Railroad#! — or answer the matching charter event — to begin construction."
 je_nc_wilmington_weldon_building_status_loc: "The Wilmington & Weldon is chartered and under construction. Expand #b Railways#! in North Carolina to level 8."
 je_nc_wilmington_weldon_charter_tt: "Chartered the Wilmington and Weldon Railroad"
 je_nc_wilmington_weldon_rails_tt: "North Carolina has at least 8 levels of Railways"

 je_nc_raleigh_gaston: "Raleigh & Gaston Railroad"
 je_nc_raleigh_gaston_desc: "A shorter inland spur of about 85 miles from Gaston on the Roanoke to the capital at Raleigh. Charter it via #b Decisions#! or a charter event, then expand #b Railways#! in North Carolina to level 10."
 je_nc_raleigh_gaston_reason: "Charter the smaller Raleigh & Gaston spur (Decision or event), then build Railways in North Carolina to level 10."
 je_nc_raleigh_gaston_progress_status_loc: "Open Decisions and take #b Charter Raleigh & Gaston Railroad#! — or answer the matching charter event — to begin construction."
 je_nc_raleigh_gaston_building_status_loc: "The Raleigh & Gaston spur is chartered and under construction. Expand #b Railways#! in North Carolina to level 10."
 je_nc_raleigh_gaston_charter_tt: "Chartered the Raleigh and Gaston Railroad"
 je_nc_raleigh_gaston_rails_tt: "North Carolina has at least 10 levels of Railways"

 je_nc_ncr_trunk: "North Carolina Railroad"
 je_nc_ncr_trunk_desc: "The great Piedmont trunk — over 220 miles from Goldsboro through Raleigh and Greensboro to Charlotte — will unite the state. Charter it via #b Decisions#! or a charter event, then expand #b Railways#! to level 13."
 je_nc_ncr_trunk_reason: "Charter the North Carolina Railroad trunk (Decision or event), then build Railways in North Carolina to level 13."
 je_nc_ncr_trunk_progress_status_loc: "Open Decisions and take #b Charter North Carolina Railroad#! — or answer the matching charter event — to begin construction."
 je_nc_ncr_trunk_building_status_loc: "The North Carolina Railroad is chartered and under construction. Expand #b Railways#! in North Carolina to level 13."
 je_nc_ncr_trunk_charter_tt: "Chartered the North Carolina Railroad trunk"
 je_nc_ncr_trunk_rails_tt: "North Carolina has at least 13 levels of Railways"

 je_nc_atlantic_nc: "Atlantic & North Carolina Railroad"
 je_nc_atlantic_nc_desc: "With the Piedmont trunk in place, Goldsboro still needs a deep-water outlet. The Atlantic & North Carolina — the 'Old Mullet Road' — will run about 95 miles east to Morehead City and Beaufort Harbor. Charter it via #b Decisions#! or a charter event, then expand #b Railways#! to level 16."
 je_nc_atlantic_nc_reason: "Charter the Atlantic & North Carolina (Decision or event), then build Railways to level 16."
 je_nc_atlantic_nc_progress_status_loc: "Open Decisions and take #b Charter Atlantic & North Carolina Railroad#! — or answer the matching charter event — to begin construction."
 je_nc_atlantic_nc_building_status_loc: "The Atlantic & North Carolina is chartered and under construction. Expand #b Railways#! in North Carolina to level 16."
 je_nc_atlantic_nc_charter_tt: "Chartered the Atlantic & North Carolina Railroad"
 je_nc_atlantic_nc_rails_tt: "North Carolina has at least 16 levels of Railways"

 je_nc_western_nc: "Western North Carolina Railroad"
 je_nc_western_nc_desc: "The hardest work remains: drive iron through the Blue Ridge toward Asheville and the Tennessee line. Mountain grades, tunnels, and trestles make the Western North Carolina Railroad the costliest charter of all. Charter it via #b Decisions#! or a charter event, then expand #b Railways#! to level 20."
 je_nc_western_nc_reason: "Charter the Western North Carolina Railroad (Decision or event), then build Railways to level 20."
 je_nc_western_nc_progress_status_loc: "Open Decisions and take #b Charter Western North Carolina Railroad#! — or answer the matching charter event — to begin construction."
 je_nc_western_nc_building_status_loc: "The Western North Carolina Railroad is chartered and under construction. Expand #b Railways#! in North Carolina to level 20."
 je_nc_western_nc_charter_tt: "Chartered the Western North Carolina Railroad"
 je_nc_western_nc_rails_tt: "North Carolina has at least 20 levels of Railways"

 nc_railroad_complete_tt: "North Carolina gains a permanent #b Carolina Rail Network#! bonus to railways, infrastructure, construction, and migration."
 event_effects_nc_railroad.13_tt: "$event_effect_choose_one$ #indent_newline:3 \n• North Carolina gets a 2-year Western North Carolina Railroad bonus\n• North Carolina gets permanent $nc_carolina_rail_network$#!"

 je_nc_research_triangle: "Found the Research Triangle"
 je_nc_research_triangle_desc: "With the University of North Carolina already standing at Chapel Hill, planners envision a triangle of learning linking Raleigh and Durham. Found NC State University and Duke University in North Carolina to bind the Piedmont into America's next great research hub — then choose which campus expands the system next."
 je_nc_research_triangle_reason: "Available from the start. Found NC State and Duke beside UNC to complete the Research Triangle."
 je_nc_research_triangle_progress_status_loc: "UNC stands at Chapel Hill. Build NC State University and Duke University in North Carolina to complete the Research Triangle."
 je_nc_research_triangle_nc_state_only_status_loc: "NC State University has been founded in Raleigh. Duke University in Durham remains to be built."
 je_nc_research_triangle_duke_only_status_loc: "Duke University has been founded in Durham. NC State University in Raleigh remains to be built."
 je_nc_research_triangle_complete_status_loc: "All three universities stand ready. The Research Triangle can now be formally united."
