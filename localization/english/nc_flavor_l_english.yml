 nc_centennial_campus: "Centennial Campus Plan"
 nc_centennial_campus_desc: "Unlocks NC State's Centennial Campus production method after the research-park expansion is complete."
 nc_flavor_events.36.t: "Centennial Campus"
 nc_flavor_events.36.d: "Years after NC State opened its doors, the trustees propose a second campus — a research park marrying engineering labs to Piedmont industry. Fund the board and expansion begins at once, rushed toward completion."
 nc_flavor_events.36.f: "'One campus taught the state to farm and forge. The next will teach it to invent.'"
