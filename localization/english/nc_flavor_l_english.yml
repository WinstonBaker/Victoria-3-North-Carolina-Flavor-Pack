 # Buildings
 building_nc_state_university: "North Carolina State University"
 building_nc_state_university_desc: "A land-grant college in Raleigh devoted to agriculture, engineering, and the practical sciences of the New South."
 building_duke_university: "Duke University"
 building_duke_university_desc: "A Methodist-founded university in Durham, raised by tobacco wealth into one of the South's great centers of learning."
 building_unc_chapel_hill: "University of North Carolina at Chapel Hill"
 building_unc_chapel_hill_desc: "Chartered in 1789 and opened in 1795, the University of North Carolina at Chapel Hill is the oldest public university in the United States still teaching on its original campus."
 building_wake_forest_college: "Wake Forest College"
 building_wake_forest_college_desc: "Founded in 1834 as a Baptist manual-labor institute, Wake Forest College trains ministers and scholars in the Piedmont."
 building_davidson_college: "Davidson College"
 building_davidson_college_desc: "A Presbyterian classical college near Charlotte, founded to educate Piedmont youth in letters, science, and faith."
 building_unc_charlotte: "University of North Carolina at Charlotte"
 building_unc_charlotte_desc: "A growing Piedmont campus serving Charlotte's industrial belt with practical and professional education."
 building_unc_asheville: "University of North Carolina at Asheville"
 building_unc_asheville_desc: "A mountain liberal-arts campus in the Blue Ridge, drawing scholars to western North Carolina."
 building_unc_wilmington: "University of North Carolina at Wilmington"
 building_unc_wilmington_desc: "A coastal campus on the Cape Fear, linking maritime trade, science, and regional learning."
 building_appalachian_state: "Appalachian State University"
 building_appalachian_state_desc: "A mountain teachers' college in Boone that trains educators for the high country and beyond."
 building_east_carolina_university: "East Carolina University"
 building_east_carolina_university_desc: "An eastern Carolina teachers' college that grows into a major regional university for the Coastal Plain."
 building_western_carolina_university: "Western Carolina University"
 building_western_carolina_university_desc: "A Cullowhee mountain campus serving the far west with teacher training and regional scholarship."
 building_unc_greensboro: "University of North Carolina at Greensboro"
 building_unc_greensboro_desc: "The State Normal and Industrial School for women, later a cornerstone of the UNC system in the Piedmont."
 building_nc_at_university: "North Carolina A&T State University"
 building_nc_at_university_desc: "A land-grant college for Black students in Greensboro, devoted to agriculture, mechanics, and the practical sciences."
 building_shaw_university: "Shaw University"
 building_shaw_university_desc: "Founded in Raleigh as the oldest historically Black college in the South, training ministers, teachers, and civic leaders."
 building_elon_university: "Elon University"
 building_elon_university_desc: "A Christian college in the Piedmont known for its cupola campus and liberal arts tradition."
 building_nc_central_university: "North Carolina Central University"
 building_nc_central_university_desc: "A Durham university for Black scholars, later a vital member of North Carolina's public higher-education system."
 building_unc_school_of_the_arts: "University of North Carolina School of the Arts"
 building_unc_school_of_the_arts_desc: "A conservatory in Winston-Salem training dancers, musicians, actors, and filmmakers — Carolina's stage for national prestige."
 building_johnson_c_smith_university: "Johnson C. Smith University"
 building_johnson_c_smith_university_desc: "A Charlotte HBCU rooted in the Reconstruction era, training ministers, teachers, and urban professionals for the Piedmont's Black communities."
 building_fayetteville_state: "Fayetteville State University"
 building_fayetteville_state_desc: "A Sandhills teachers college for Black students, later a cornerstone of public higher education in the Cape Fear hinterland."
 building_unc_pembroke: "University of North Carolina at Pembroke"
 building_unc_pembroke_desc: "A regional campus in the Coastal Plain founded to educate Native and local youth — a distinctive voice in Carolina's university network."
 building_nc_state_capitol: "North Carolina State Capitol"
 building_nc_state_capitol_desc: "Raleigh's Greek Revival capitol, begun in 1833. By game start the stone exterior is largely standing; remaining work finishes the interiors toward the 1840 opening."
 building_biltmore_house: "Biltmore House"
 building_biltmore_house_desc: "George Washington Vanderbilt II's vast Blue Ridge estate near Asheville — the largest private residence in America when it opened at Christmas 1895."

 # Lighthouses — 1836 starting
 building_nc_old_baldy_lighthouse: "Old Baldy Lighthouse"
 building_nc_old_baldy_lighthouse_desc: "The Bald Head Island light guides shipping into the Cape Fear River toward Wilmington."
 building_nc_ocracoke_lighthouse: "Ocracoke Lighthouse"
 building_nc_ocracoke_lighthouse_desc: "A short white tower watching Ocracoke Inlet, vital to Outer Banks trade."
 building_nc_cape_hatteras_lighthouse: "Cape Hatteras Lighthouse"
 building_nc_cape_hatteras_lighthouse_desc: "The original 1803 sandstone tower on the Graveyard of the Atlantic. May later be rebuilt as a taller brick light."

