 je_nc_uni_progress_wilmington_tt: "UNC Wilmington founded"
 je_nc_uni_progress_wssu_tt: "Winston-Salem State founded"

 je_nc_university_system_progress: "Expand the University System"
 je_nc_university_system_progress_desc: "After the Research Triangle, charter the remaining UNC System campuses across North Carolina. Found #b 7#! for a mid-system bonus, and all #b 14#! to complete the Carolina University System."
 je_nc_university_system_progress_reason: "Tracks chartered campus progress toward a statewide university network."
 je_nc_university_system_progress_tt: "All 14 UNC System charter campuses have been founded"
 je_nc_university_system_progress_early_status_loc: "Charter UNC System campuses from Decisions. Mid-system rewards unlock after 7 campuses; full completion needs all 14."
 je_nc_university_system_progress_expanding_status_loc: "The Expanding University System bonus is active. Found the remaining campuses to complete the network."
 je_nc_university_system_progress_mid_status_loc: "Several campuses stand. Keep chartering — Expanding University System unlocks at 7 founded campuses."

 je_nc_western_nc: "Western North Carolina Railroad"
 je_nc_western_nc_desc: "The hardest work remains: drive iron through the Blue Ridge toward Asheville and the Tennessee line. Mountain grades, tunnels, and trestles make the Western North Carolina Railroad the costliest charter of all. Charter it via #b Decisions#! or a charter event, then expand #b Railways#! to level 20."
 je_nc_western_nc_reason: "Charter the Western North Carolina Railroad (Decision or event), then build Railways to level 20."
 je_nc_western_nc_building_status_loc: "The Western North Carolina Railroad is chartered and under construction. Expand #b Railways#! in North Carolina to level 20."
 je_nc_western_nc_charter_tt: "Chartered the Western North Carolina Railroad"
 je_nc_western_nc_progress_status_loc: "Open Decisions and take #b Charter Western North Carolina Railroad#! — or answer the matching charter event — to begin construction."
 je_nc_western_nc_rails_tt: "North Carolina has at least 20 levels of Railways"

 je_nc_wilmington_weldon: "Wilmington & Weldon Railroad"
 je_nc_wilmington_weldon_desc: "Promoters in Wilmington propose a continuous line north to Weldon on the Roanoke — nearly 160 miles, and for a time the world's longest railroad. Charter it via #b Decisions#! or a charter event to queue a railway push. Finish by expanding #b Railways#! in North Carolina to level 8."
 je_nc_wilmington_weldon_reason: "Charter the Wilmington & Weldon (Decision or event), then build Railways in North Carolina to level 8."
 je_nc_wilmington_weldon_building_status_loc: "The Wilmington & Weldon is chartered and under construction. Expand #b Railways#! in North Carolina to level 8."
 je_nc_wilmington_weldon_charter_tt: "Chartered the Wilmington and Weldon Railroad"
 je_nc_wilmington_weldon_progress_status_loc: "Open Decisions and take #b Charter Wilmington & Weldon Railroad#! — or answer the matching charter event — to begin construction."
 je_nc_wilmington_weldon_rails_tt: "North Carolina has at least 8 levels of Railways"

 je_nc_wright_brothers: "Winds Over Kitty Hawk"
 je_nc_wright_brothers_desc: "On the Outer Banks near Kitty Hawk, bicycle men from Ohio test gliders against Carolina wind. Fund their Kill Devil Hills camp via Decisions, then wait for the day a powered aeroplane stays aloft — and carry North Carolina's name into the age of flight."
 je_nc_wright_brothers_reason: "Available from 1896 while you own North Carolina. Fund Kitty Hawk experiments and witness the first flight."
 je_nc_wright_brothers_flight_status_loc: "Flight and funding are done — finish the aviation journal."
 je_nc_wright_brothers_flight_tt: "Witnessed the Wright brothers' first flight"
 je_nc_wright_brothers_fund_tt: "Funded Kitty Hawk / Kill Devil Hills experiments"
 je_nc_wright_brothers_funded_status_loc: "Kitty Hawk is funded. Await the first powered flight on the Outer Banks."
 je_nc_wright_brothers_progress_status_loc: "Open Decisions to #b Fund Kitty Hawk Experiments#!. The first flight may come after December 1903."

