 # === Buildings ===

 building_appalachian_state: "Appalachian State University"
 building_appalachian_state_desc: "A mountain teachers' college in Boone that trains educators for the high country and beyond."

 building_biltmore_house: "Biltmore House"
 building_biltmore_house_desc: "George Washington Vanderbilt II's vast Blue Ridge estate near Asheville — the largest private residence in America when it opened at Christmas 1895."

 building_davidson_college: "Davidson College"
 building_davidson_college_desc: "A Presbyterian classical college near Charlotte, founded to educate Piedmont youth in letters, science, and faith."

 building_duke_university: "Duke University"
 building_duke_university_desc: "A Methodist-founded university in Durham, raised by tobacco wealth into one of the South's great centers of learning."

 building_east_carolina_university: "East Carolina University"
 building_east_carolina_university_desc: "An eastern Carolina teachers' college that grows into a major regional university for the Coastal Plain."

 building_elizabeth_city_state: "Elizabeth City State University"
 building_elizabeth_city_state_desc: "A teachers' college for Black students on the Pasquotank, later a coastal campus in North Carolina's public university system."

 building_elon_university: "Elon University"
 building_elon_university_desc: "A Christian college in the Piedmont known for its cupola campus and liberal arts tradition."

 building_fayetteville_state: "Fayetteville State University"
 building_fayetteville_state_desc: "A Sandhills teachers' college for Black students, later a cornerstone of public higher education in the Cape Fear hinterland."

 building_johnson_c_smith_university: "Johnson C. Smith University"
 building_johnson_c_smith_university_desc: "A Charlotte HBCU rooted in the Reconstruction era, training ministers, teachers, and urban professionals for the Piedmont's Black communities."

 building_nc_at_university: "North Carolina A&T State University"
 building_nc_at_university_desc: "A land-grant college for Black students in Greensboro, devoted to agriculture, mechanics, and the practical sciences."

 building_nc_bodie_island_lighthouse: "Bodie Island Lighthouse"
 building_nc_bodie_island_lighthouse_desc: "A black-and-white banded light on the Outer Banks (historically completed 1872)."

 building_nc_cape_fear_lighthouse: "Cape Fear Lighthouse"
 building_nc_cape_fear_lighthouse_desc: "A modern coastal light for Frying Pan Shoals and the Cape Fear approaches (historically completed 1903)."

 building_nc_cape_hatteras_lighthouse: "Cape Hatteras Lighthouse"
 building_nc_cape_hatteras_lighthouse_desc: "The original 1803 sandstone tower on the Graveyard of the Atlantic. May later be rebuilt as a taller brick light."

 building_nc_cape_lookout_lighthouse: "Cape Lookout Lighthouse"
 building_nc_cape_lookout_lighthouse_desc: "A diamond-patterned tower marking Lookout Shoals (historically completed 1859)."

 building_nc_central_university: "North Carolina Central University"
 building_nc_central_university_desc: "A Durham university for Black scholars, later a vital member of North Carolina's public higher-education system."

 building_nc_currituck_beach_lighthouse: "Currituck Beach Lighthouse"
 building_nc_currituck_beach_lighthouse_desc: "An unpainted brick tower closing the last dark stretch of the northern Banks (historically 1875)."

 building_nc_ocracoke_lighthouse: "Ocracoke Lighthouse"
 building_nc_ocracoke_lighthouse_desc: "A short white tower watching Ocracoke Inlet, vital to Outer Banks trade."

 building_nc_old_baldy_lighthouse: "Old Baldy Lighthouse"
 building_nc_old_baldy_lighthouse_desc: "The Bald Head Island light guides shipping into the Cape Fear River toward Wilmington."

 building_nc_state_capitol: "North Carolina State Capitol"
 building_nc_state_capitol_desc: "Raleigh's Greek Revival capitol, begun in 1833. By game start the stone exterior is largely standing; remaining work finishes the interiors toward the 1840 opening."

 building_nc_state_university: "North Carolina State University"
 building_nc_state_university_desc: "A land-grant college in Raleigh devoted to agriculture, engineering, and the practical sciences of the New South."

 building_shaw_university: "Shaw University"
 building_shaw_university_desc: "Founded in Raleigh as the oldest historically Black college in the South, training ministers, teachers, and civic leaders."

 building_unc_asheville: "University of North Carolina at Asheville"
 building_unc_asheville_desc: "A mountain liberal-arts campus in the Blue Ridge, drawing scholars to western North Carolina."

 building_unc_chapel_hill: "University of North Carolina at Chapel Hill"
 building_unc_chapel_hill_desc: "Chartered in 1789 and opened in 1795, the University of North Carolina at Chapel Hill is the oldest public university in the United States still teaching on its original campus."

 building_unc_charlotte: "University of North Carolina at Charlotte"
 building_unc_charlotte_desc: "A growing Piedmont campus serving Charlotte's industrial belt with practical and professional education."

 building_unc_greensboro: "University of North Carolina at Greensboro"
 building_unc_greensboro_desc: "The State Normal and Industrial School for women, later a cornerstone of the UNC system in the Piedmont."

 building_unc_pembroke: "University of North Carolina at Pembroke"
 building_unc_pembroke_desc: "A regional campus in the Coastal Plain founded to educate Native and local youth — a distinctive voice in Carolina's university network."

 building_unc_school_of_the_arts: "University of North Carolina School of the Arts"
 building_unc_school_of_the_arts_desc: "A conservatory in Winston-Salem training dancers, musicians, actors, and filmmakers — Carolina's stage for national prestige."

 building_unc_wilmington: "University of North Carolina at Wilmington"
 building_unc_wilmington_desc: "A coastal campus on the Cape Fear, linking maritime trade, science, and regional learning."

 building_wake_forest_college: "Wake Forest College"
 building_wake_forest_college_desc: "Founded in 1834 as a Baptist manual-labor institute, Wake Forest College trains ministers and scholars in the Piedmont."

 building_western_carolina_university: "Western Carolina University"
 building_western_carolina_university_desc: "A Cullowhee mountain campus serving the far west with teacher training and regional scholarship."

 building_winston_salem_state: "Winston-Salem State University"
 building_winston_salem_state_desc: "A Piedmont teachers' college for Black students in Winston-Salem, later a vital regional campus in the UNC System."

 # === Companies ===

 company_burlington_industries: "Burlington Industries"
 company_burlington_industries_desc: "Burlington Industries grew from Alamance mills into a Piedmont textile conglomerate, linking cotton plantations, logging, and sprawling mill towns under one corporate banner."
 company_cannon_mills: "Cannon Mills"
 company_cannon_mills_desc: "Cannon Mills of Concord built towels and sheets into a household name. Company villages, mill stores, and Piedmont cotton feed a textile works that defines Cabarrus County industry."
 company_cone_mills: "Cone Mills"
 company_cone_mills_desc: "Cone Mills of Greensboro specialized in denim and work cloth, supplying mills and markets across the South. Cotton plantations and Piedmont spindles feed its Greensboro works."
 company_duke_power: "Duke Power"
 company_duke_power_desc: "Southern Power — later Duke Power — electrified the Piedmont with hydroelectric dams and coal plants. Cheap current turns mill spindles, streetcars, and New South factories long after dark."
 company_hanes: "P.H. Hanes Knitting Company"
 company_hanes_desc: "P.H. Hanes Knitting Company turned Winston cotton into hosiery and underwear for every strata of society. Mill villages and mail-order catalogs made knit goods a Carolina export."
 company_high_point_furniture: "High Point Furniture"
 company_high_point_furniture_desc: "High Point's furniture makers convert Carolina hardwood into parlor suites for a national market. Showrooms and factories make the Triad a byword for Southern furniture manufacturing."
 company_liggett_myers: "Liggett & Myers Tobacco Company"
 company_liggett_myers_desc: "Liggett & Myers rose in Durham as a rival tobacco giant, packing cigarettes and chewing tobacco that competed head-to-head with Duke along the brightleaf corridor."
 company_nc_railroad: "North Carolina Railroad Company"
 company_nc_railroad_desc: "The state-backed North Carolina Railroad Company operates the Piedmont trunk that knits Wilmington, Raleigh, Greensboro, and Charlotte into one commercial system — rails, motors, and public prestige. Available to charter once the Piedmont NCR trunk journal is complete."
 company_pepsi_cola: "Pepsi-Cola Company"
 company_pepsi_cola_desc: "From Caleb Bradham's New Bern pharmacy counter, Pepsi-Cola bottled a Carolina soft drink for the nation. Food industry and coastal trade carry the brand far beyond Craven County."
 company_rj_reynolds: "R.J. Reynolds Tobacco Company"
 company_rj_reynolds_desc: "Founded in Winston, R.J. Reynolds Tobacco Company turned local brightleaf into a mass-market cigarette empire. Its factories anchor the western Piedmont tobacco belt and pull leaf, labor, and capital into Winston-Salem."
 company_vick_chemical: "Vick Chemical Company"
 company_vick_chemical_desc: "Vick Chemical of Greensboro packaged mentholated remedies — most famously VapoRub — from pharmacy experiments into a national chemical brand rooted in Piedmont industry."
 company_w_duke_sons: "W. Duke, Sons & Co."
 company_w_duke_sons_desc: "Washington Duke's Durham firm grew from a small brightleaf packing shed into one of America's great tobacco houses. W. Duke, Sons & Co. dominates cigarette manufacture along the Durham–Winston corridor and ties Piedmont plantations to national markets."
 # Tobacco prestige goods use vanilla turkish/basma/cigars (cap full). Textile/other NC goods below.
 prestige_good_cannon_towels: "Cannon Towels"
 prestige_good_cannon_towels_desc: "Cannon Mills household textiles — towels and linens that made Kannapolis a mill-town name."
 prestige_good_cone_denim: "Cone Denim"
 prestige_good_cone_denim_desc: "Greensboro denim and work cloth from Cone Mills, built for durability and volume."
 prestige_good_hanes_knitwear: "Hanes Knitwear"
 prestige_good_hanes_knitwear_desc: "Winston-Salem knit goods from Hanes — underwear and hosiery for a growing mass market."
 prestige_good_high_point_furniture: "High Point Furniture"
 prestige_good_high_point_furniture_desc: "Cabinetwork and parlor sets from High Point's furniture mansions and showrooms."
 prestige_good_pepsi_cola: "Pepsi-Cola"
 prestige_good_pepsi_cola_desc: "Caleb Bradham's New Bern soda fountain formula — a Carolina grocery brand with national reach."
 prestige_good_vicks_remedies: "Vicks Remedies"
 prestige_good_vicks_remedies_desc: "Greensboro chemical specialties from Vick Chemical — household remedies produced as industrial chemistry (Charters of Commerce prestige good)."

