l_english:

 # Journal Entries Group
 je_group_nc_flavor: "North Carolina"
 je_group_nc_flavor_desc: "From gold in the Piedmont creeks to tar in the coastal pines, North Carolina's landscape shaped its people and its industry throughout the nineteenth century."

 # Journal Entries
 je_nc_tar_heel_legacy: "Tar Heel Legacy"
 je_nc_tar_heel_legacy_desc: "North Carolina sits at a crossroads of the Old South and the rising industrial order. Tobacco fields blanket the Piedmont, pine forests feed naval stores, and Wilmington's harbor opens the state to the Atlantic world. Develop the Tar Heel State into a powerhouse of agriculture, textiles, and rail."

 je_nc_brightleaf_revolution: "The Brightleaf Revolution"
 je_nc_brightleaf_revolution_desc: "A new method of flue-curing tobacco produces a lighter, golden leaf that commands premium prices on world markets. Carolina planters who embrace the brightleaf revolution may dominate the global tobacco trade."

 je_nc_iron_horse: "The Iron Horse of Carolina"
 je_nc_iron_horse_desc: "Railroads are stitching together North Carolina's scattered towns and plantations. Lines from Wilmington to the Piedmont will bind the coast to the interior and accelerate the state's transformation."

 je_nc_research_triangle: "Found the Research Triangle"
 je_nc_research_triangle_desc: "With the University of North Carolina already standing at Chapel Hill, planners envision a triangle of learning linking Raleigh and Durham. Found NC State University and Duke University in North Carolina to bind the Piedmont into America's next great research hub."
 je_nc_research_triangle_progress_status_loc: "UNC stands at Chapel Hill. Build NC State University and Duke University in North Carolina to complete the Research Triangle."
 je_nc_research_triangle_nc_state_only_status_loc: "NC State University has been founded in Raleigh. Duke University in Durham remains to be built."
 je_nc_research_triangle_duke_only_status_loc: "Duke University has been founded in Durham. NC State University in Raleigh remains to be built."
 je_nc_research_triangle_complete_status_loc: "All three universities stand ready. The Research Triangle can now be formally united."
 je_nc_research_triangle_complete_tt: "NC State University and Duke University have been built in North Carolina."

 # State Traits
 state_trait_tobacco_belt: "Tobacco Belt"
 state_trait_tobacco_belt_desc: "The rich soils of the Carolina Piedmont and coastal plain produce exceptional tobacco and cotton crops."
 state_trait_piedmont_fall_line: "Piedmont Fall Line"
 state_trait_piedmont_fall_line_desc: "Where Piedmont rivers drop sharply toward the coastal plain, fast-falling water has made this region a natural home for textile mills."
 state_trait_cape_fear_harbor: "Cape Fear Harbor"
 state_trait_cape_fear_harbor_desc: "Wilmington's deep-water port on the Cape Fear River connects the interior to Atlantic trade routes."
 state_trait_sandhills: "Sandhills"
 state_trait_sandhills_desc: "Ancient dune ridges of deep, sandy soil support vast stands of longleaf pine, source of the tar, pitch, and turpentine that gave the Tar Heel State its name."
 state_trait_mount_mitchell: "Mount Mitchell"
 state_trait_mount_mitchell_desc: "Mount Mitchell, the highest peak east of the Mississippi River, rises above the Blue Ridge in the Black Mountains. Its rugged slopes, dense forests, and commanding views stand as a symbol of North Carolina's natural grandeur."
 state_trait_outer_banks: "Outer Banks"
 state_trait_outer_banks_desc: "This chain of low barrier islands has wrecked countless ships on its shifting shoals, but the sheltered sounds behind them teem with fish."
 state_trait_great_dismal_swamp: "Great Dismal Swamp"
 state_trait_great_dismal_swamp_desc: "A vast and ancient wetland of cypress and juniper, worked by canal and timber crews for generations, its dense stands feeding sawmills up and down the coast."

# Companies
 company_w_duke_sons: "W. Duke, Sons & Co."
 company_rj_reynolds: "R.J. Reynolds Tobacco Company"
 company_cannon_mills: "Cannon Mills"

 # UNC Monument
 building_unc_chapel_hill: "University of North Carolina"
 building_unc_chapel_hill_lens_option: "University of North Carolina"
 pmg_monument_unc: "University Operations"
 pmg_monument_unc_desc: "How the nation's first public university serves the state."
 pm_unc_active: "First in the Nation's Heart"
 pm_unc_active_desc: "Founded in 1789, the University of North Carolina at Chapel Hill raises education access, qualifications, and national innovation."

 # Research Triangle Universities
 building_nc_state_university: "NC State University"
 building_nc_state_university_lens_option: "NC State University"
 building_duke_university: "Duke University"
 building_duke_university_lens_option: "Duke University"
 pmg_monument_nc_state: "Wolfpack Operations"
 pmg_monument_nc_state_desc: "How North Carolina's land-grant university drives engineering and industry."
 pm_nc_state_active: "Think and Do"
 pm_nc_state_active_desc: "NC State's engineers and agricultural scientists lift qualifications and industrial throughput across the Piedmont."
 pmg_monument_duke: "Blue Devil Operations"
 pmg_monument_duke_desc: "How Duke's private research university advances medicine and the liberal arts."
 pm_duke_active: "Eruditio et Religio"
 pm_duke_active_desc: "Duke University's scholars and physicians expand education access, qualifications, and national prestige."

 # Modifiers
 nc_brightleaf_success: "Brightleaf Boom"
 nc_iron_horse_boom: "Railroad Expansion"
 nc_piedmont_industrialized: "Piedmont Industrialization"
 nc_tar_heel_pride: "Tar Heel Pride"
 nc_gold_rush_excitement: "Carolina Gold Rush"
 nc_research_triangle_hub: "Research Triangle"

 # Events
 nc_flavor_events.1.t: "Gold in Cabarrus County"
 nc_flavor_events.1.d: "A twelve-year-old boy fishing in Little Meadow Creek has found a gleaming nugget of gold. Word of Reed's discovery is spreading through the Piedmont, and prospectors are already heading for the Carolina hills."
 nc_flavor_events.1.f: "'There is gold in them hills — and this time, the hills belong to us.'"
 nc_flavor_events.1.a: "Encourage prospectors to settle the Piedmont."
 nc_flavor_events.1.b: "The state treasury should claim a share of the find."

 nc_flavor_events.2.t: "The Brightleaf Cure"
 nc_flavor_events.2.d: "Planters in the Piedmont have begun curing tobacco with controlled heat rather than wood smoke. The resulting bright, yellow leaf fetches far higher prices in English and continental markets than the dark tobacco of old."
 nc_flavor_events.2.f: "'Fire cured the old way. Flues cure the future.'"
 nc_flavor_events.2.a: "Promote the new technique across the state."
 nc_flavor_events.2.b: "Let the planter class lead the transition."

 nc_flavor_events.3.t: "Wilmington and the Piedmont"
 nc_flavor_events.3.d: "Engineers have surveyed a rail line linking Wilmington's port to the tobacco towns of the interior. When completed, Carolina cotton and brightleaf tobacco will reach northern markets in days rather than weeks."
 nc_flavor_events.3.f: "'Where the rails go, prosperity follows.'"
 nc_flavor_events.3.a: "Fund the line from the national treasury."
 nc_flavor_events.3.b: "Let North Carolina's investors finance the route."

 nc_flavor_events.4.t: "First in Freedom, First in Industry"
 nc_flavor_events.4.d: "North Carolina has emerged as a model of the New South — its tobacco fields productive, its Piedmont mills humming, and its rails carrying goods to every corner of the nation. The Tar Heel State has earned its place among the industrial powers of America."
 nc_flavor_events.4.f: "'From Murphy to Manteo, Carolina leads the way.'"
 nc_flavor_events.4.a: "A proud day for the Old North State."

 nc_flavor_events.5.t: "A Triangle of Learning"
 nc_flavor_events.5.d: "Carolina leaders have proposed uniting the state's great universities into a single research corridor. Chapel Hill already hosts the nation's first public university. Now Raleigh and Durham must rise to match it — NC State for engineering and agriculture, Duke for medicine and the sciences."
 nc_flavor_events.5.f: "'From Chapel Hill to Raleigh to Durham — three points, one ambition.'"
 nc_flavor_events.5.a: "Fund the expansion of higher education."
 nc_flavor_events.5.b: "Let private endowments and state grants share the burden."

 nc_flavor_events.6.t: "The Research Triangle"
 nc_flavor_events.6.d: "NC State University in Raleigh, Duke University in Durham, and the University of North Carolina at Chapel Hill now form a triangle of laboratories, lecture halls, and libraries. Scientists, engineers, and physicians collaborate across the Piedmont, drawing talent and industry to the Old North State."
 nc_flavor_events.6.f: "'Three campuses, one frontier of knowledge.'"
 nc_flavor_events.6.a: "Carolina leads the nation in learning."
