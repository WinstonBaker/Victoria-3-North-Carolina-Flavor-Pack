 nc_expand_university_board: "Expand the University Board"
 nc_expand_university_board_desc: "Enlarge the state university board so North Carolina may charter #b two campuses at once#!. Costs treasury and authority."
 nc_expand_university_board_tt: "Charter capacity rises to #b 2#!. A second campus may be authorized while another is still under construction."

 nc_university_construction_push: "University Construction Push"
 nc_university_construction_push_desc: "Spend state funds to accelerate construction while chartered campuses are rising."
