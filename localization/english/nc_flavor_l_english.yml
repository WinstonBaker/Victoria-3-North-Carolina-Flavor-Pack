 je_nc_high_point_furniture: "Furniture Capital of the World"
 je_nc_high_point_furniture_desc: "High Point sits amid hardwood forests and rail sidings perfect for chairs, tables, and case goods. Build furniture manufactories and logging camps until the world shops Carolina woodwork."
 je_nc_high_point_furniture_reason: "Unlocks after completing Tar Heel Legacy. Piedmont hardwood and skilled joiners can make High Point the furniture capital of the world — if the factories rise."
 je_nc_high_point_progress_status_loc: "Expand furniture manufactories and the logging camps that feed them."
 je_nc_high_point_furniture_tt: "North Carolina has at least 5 levels of Furniture Manufactories"
 je_nc_high_point_logging_tt: "North Carolina has at least 5 levels of Logging Camps"
 nc_high_point_complete_tt: "North Carolina gains a lasting #b Furniture Capital#! bonus to furniture and timber."
