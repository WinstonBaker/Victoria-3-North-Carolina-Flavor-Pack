 # Lighthouses — 1836 starting
 building_nc_old_baldy_lighthouse: "Old Baldy Lighthouse"
 building_nc_old_baldy_lighthouse_desc: "The Bald Head Island light guides shipping into the Cape Fear River toward Wilmington."
 building_nc_ocracoke_lighthouse: "Ocracoke Lighthouse"
 building_nc_ocracoke_lighthouse_desc: "A short white tower watching Ocracoke Inlet, vital to Outer Banks trade."
 building_nc_cape_hatteras_lighthouse: "Cape Hatteras Lighthouse"
 building_nc_cape_hatteras_lighthouse_desc: "The original 1803 sandstone tower on the Graveyard of the Atlantic. May later be rebuilt as a taller brick light."

 # Lighthouses — unlockable
 building_nc_cape_lookout_lighthouse: "Cape Lookout Lighthouse"
 building_nc_cape_lookout_lighthouse_desc: "A diamond-patterned tower marking Lookout Shoals (historically completed 1859)."
 building_nc_bodie_island_lighthouse: "Bodie Island Lighthouse"
 building_nc_bodie_island_lighthouse_desc: "A black-and-white banded light on the Outer Banks (historically completed 1872)."
 building_nc_currituck_beach_lighthouse: "Currituck Beach Lighthouse"
 building_nc_currituck_beach_lighthouse_desc: "An unpainted brick tower closing the last dark stretch of the northern Banks (historically 1875)."
 building_nc_cape_fear_lighthouse: "Cape Fear Lighthouse"
 building_nc_cape_fear_lighthouse_desc: "A modern steel-skeleton light for Frying Pan Shoals (historically completed 1903)."

 # State Traits
 state_trait_tobacco_belt: "Tobacco Belt"
 state_trait_tobacco_belt_desc: "The rich soils of the Carolina Piedmont and coastal plain produce exceptional tobacco and cotton crops."
 state_trait_piedmont_fall_line: "Piedmont Fall Line"
 state_trait_piedmont_fall_line_desc: "Where Piedmont rivers drop sharply toward the coastal plain, fast-falling water has made this region a natural home for textile mills."
 state_trait_cape_fear_harbor: "Cape Fear Harbor"
 state_trait_cape_fear_harbor_desc: "Wilmington's deep-water port on the Cape Fear River connects the interior to Atlantic trade routes."
 state_trait_sandhills: "Sandhills"
 state_trait_sandhills_desc: "Ancient dune ridges of deep, sandy soil support vast stands of longleaf pine, source of the tar, pitch, and turpentine that gave the Tar Heel State its name."
 state_trait_mount_mitchell: "Mount Mitchell"
 state_trait_mount_mitchell_desc: "Mount Mitchell, the highest peak east of the Mississippi River, rises above the Blue Ridge in the Black Mountains. Its rugged slopes, dense forests, and commanding views stand as a symbol of North Carolina's natural grandeur."
 state_trait_outer_banks: "Outer Banks"
 state_trait_outer_banks_desc: "This chain of low barrier islands has wrecked countless ships on its shifting shoals, but the sheltered sounds behind them teem with fish. Lighthouses along the Graveyard of the Atlantic guide merchant shipping through dangerous waters."
 state_trait_great_dismal_swamp: "Great Dismal Swamp"
 state_trait_great_dismal_swamp_desc: "A vast and ancient wetland of cypress and juniper, worked by canal and timber crews for generations, its dense stands feeding sawmills up and down the coast."

