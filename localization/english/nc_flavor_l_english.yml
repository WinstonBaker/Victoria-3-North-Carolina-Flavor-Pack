l_english:

 # Journal Entries Group
 je_group_nc_flavor: "North Carolina"
 je_group_nc_flavor_desc: "From gold in the Piedmont creeks to tar in the coastal pines, North Carolina's landscape shaped its people and its industry throughout the nineteenth century."

 # Journal Entries
 je_nc_tar_heel_legacy: "Tar Heel Legacy"
 je_nc_tar_heel_legacy_desc: "North Carolina sits at a crossroads of the Old South and the rising industrial order. Tobacco fields blanket the Piedmont, pine forests feed naval stores, and Wilmington's harbor opens the state to the Atlantic world. Develop the Tar Heel State into a powerhouse of agriculture, timber, and trade."
 je_nc_tar_heel_legacy_reason: "Tobacco, timber, and naval stores can make North Carolina a New South powerhouse — if the fields and pine forests are developed in earnest."

 je_nc_railroad: "Complete the North Carolina Railroad"
 je_nc_railroad_desc: "Scattered lines already stitch together pieces of the Old North State, but a true statewide system demands three great works: the Wilmington and Weldon Railroad, the Raleigh and Gaston Railroad, and the North Carolina Railroad trunk from Goldsboro to Charlotte. Bind coast to mountains and make Carolina the hinge of Southern commerce."
 je_nc_railroad_reason: "North Carolina needs a true statewide rail system — Wilmington to Weldon, Raleigh to Gaston, and a Piedmont trunk from Goldsboro to Charlotte — before the Old North State can move at the speed of steam."
 je_nc_railroad_progress_status_loc: "Begin with the Wilmington and Weldon Railroad — upon completion, the longest railroad in the world."
 je_nc_railroad_gaston_status_loc: "Wilmington and Weldon is secured. Next: link Gaston to Raleigh on the Raleigh and Gaston Railroad."
 je_nc_railroad_ncr_status_loc: "Coastal and northern lines stand ready. Charter and complete the North Carolina Railroad trunk through the Piedmont."
 je_nc_railroad_complete_status_loc: "All three great lines are chartered. Expand North Carolina's railways to cement the network."
 je_nc_railroad_ww_tt: "The Wilmington and Weldon Railroad has been funded"
 je_nc_railroad_rg_tt: "The Raleigh and Gaston Railroad has been funded"
 je_nc_railroad_ncr_tt: "The North Carolina Railroad trunk has been funded"
 je_nc_railroad_rails_tt: "North Carolina has at least 5 levels of Railways"
 nc_railroad_complete_tt: "North Carolina gains a lasting #b Carolina Rail Network#! bonus to railways, infrastructure, and construction."
 event_effects_nc_railroad.13_tt: "$event_effect_choose_one$ #indent_newline:3 \n• North Carolina gets $nc_carolina_rail_network$#!"

 je_nc_research_triangle: "Found the Research Triangle"
 je_nc_research_triangle_desc: "With the University of North Carolina already standing at Chapel Hill, planners envision a triangle of learning linking Raleigh and Durham. Found NC State University and Duke University in North Carolina to bind the Piedmont into America's next great research hub."
 je_nc_research_triangle_reason: "With the University of North Carolina already standing at Chapel Hill, planners envision a triangle of learning linking Raleigh and Durham."
 je_nc_research_triangle_goal: "Found NC State University and Duke University in North Carolina to complete the Research Triangle."
 je_nc_research_triangle_progress_status_loc: "UNC stands at Chapel Hill. Build NC State University and Duke University in North Carolina to complete the Research Triangle."
 je_nc_research_triangle_nc_state_only_status_loc: "NC State University has been founded in Raleigh. Duke University in Durham remains to be built."
 je_nc_research_triangle_duke_only_status_loc: "Duke University has been founded in Durham. NC State University in Raleigh remains to be built."
 je_nc_research_triangle_complete_status_loc: "All three universities stand ready. The Research Triangle can now be formally united."
 je_nc_research_triangle_unc_tt: "The University of North Carolina stands in North Carolina"
 je_nc_research_triangle_ncsu_tt: "North Carolina State University has been founded in North Carolina"
 je_nc_research_triangle_duke_tt: "Duke University has been founded in North Carolina"
 je_nc_research_triangle_complete_tt: "NC State University and Duke University have been built in North Carolina."

 rt_universities_unlocked_tt: "Construction of #b North Carolina State University#! and #b Duke University#! is now available in North Carolina."
 rt_universities_established_tt: "North Carolina gains the unified #b Research Triangle#! modifier, granting strong university throughput and innovation."
 event_effects_nc_research_triangle.6_tt: "$event_effect_choose_one$ #indent_newline:3 \n• [ROOT.GetCountry.GetName] gets $nc_research_triangle_country$\n• North Carolina gets $nc_research_triangle$#!"

 je_nc_state_capitol: "Finish the State Capitol"
 je_nc_state_capitol_desc: "Work on a new Greek Revival capitol in Raleigh began in 1833 after fire destroyed the old State House. By 1836 the exterior walls are largely up — roughly two-fifths finished — with interiors still to come before the historical 1840 completion. Finish the building and give North Carolina a lasting seat of government."
 je_nc_state_capitol_reason: "Raleigh's new State Capitol is already rising in stone. Finish the interiors and dedicate a lasting seat of government for North Carolina."
 je_nc_state_capitol_tt: "The North Carolina State Capitol has been completed in Raleigh"

 je_nc_biltmore: "Raise the Biltmore House"
 je_nc_biltmore_desc: "George Washington Vanderbilt II has begun assembling a vast estate in the Blue Ridge near Asheville. Support — or merely permit — the construction of Biltmore House, destined to open at Christmas 1895 as America's grandest private residence."
 je_nc_biltmore_reason: "A Vanderbilt fortune is reshaping the Blue Ridge near Asheville. Whether the state aids the project or not, Biltmore House will define western North Carolina's Gilded Age."
 je_nc_biltmore_tt: "Biltmore House has been completed in North Carolina"
 nc_biltmore_unlocked_tt: "Construction of #b Biltmore House#! is now available in North Carolina."
 nc_biltmore_complete_tt: "Biltmore House awards lasting prestige and migration attraction to North Carolina."
 event_effects_nc_biltmore.21_tt: "$event_effect_choose_one$ #indent_newline:3 \n• [ROOT.GetCountry.GetName] gets $nc_biltmore_prestige$\n• North Carolina gets $nc_biltmore_attraction$#!"

 je_nc_piedmont_textiles: "Raise the Piedmont Mills"
 je_nc_piedmont_textiles_desc: "Along the fall line from Charlotte to Gastonia and Concord, water power and cheap cotton invite a New South experiment: mill villages spinning Southern fiber into cloth. Build textile mills and cotton plantations until the Piedmont hums with spindles."
 je_nc_piedmont_textiles_reason: "The Piedmont fall line offers water power, cotton, and labor for a textile belt to rival New England — if mills and mill villages rise in earnest."
 je_nc_piedmont_textiles_progress_status_loc: "Raise textile mills along the Piedmont and secure cotton to feed the spindles."
 je_nc_piedmont_textiles_mills_status_loc: "The mills stand ready. Expand cotton plantings to finish the Piedmont textile belt."
 je_nc_piedmont_textiles_mills_tt: "North Carolina has at least 5 levels of Textile Mills"
 je_nc_piedmont_textiles_cotton_tt: "North Carolina has at least 3 levels of Cotton Plantations"
 nc_piedmont_textiles_complete_tt: "North Carolina gains a lasting #b Piedmont Textile Belt#! bonus to mills, cotton, and light industry."
