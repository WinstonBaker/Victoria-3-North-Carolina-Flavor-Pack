 je_nc_duke_power: "Light the Piedmont"
 je_nc_duke_power_desc: "James B. Duke's Southern Power Company aims to dam the Catawba and electrify the mill belt. Raise power plants and feed industry until the Piedmont runs on hydroelectric current."
 je_nc_duke_power_reason: "Hydroelectric power on the Catawba can turn Carolina mills into an electrified New South workshop — if the grid is built."
 je_nc_duke_power_progress_status_loc: "Build power plants and keep Piedmont industry humming on the new grid."
 je_nc_duke_power_plants_tt: "North Carolina has at least 5 levels of Power Plants"
 je_nc_duke_power_industry_tt: "North Carolina has substantial textile mills or furniture manufactories"
 nc_duke_power_complete_tt: "North Carolina gains a lasting #b Duke Power Grid#! bonus to electricity and industry."
