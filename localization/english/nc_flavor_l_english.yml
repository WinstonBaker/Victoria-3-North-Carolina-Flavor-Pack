 je_nc_university_system_progress: "Expand the University System"
 je_nc_university_system_progress_desc: "After the Research Triangle, charter regional campuses across North Carolina. Found #b 8#! for a mid-system bonus, and all #b 16#! to complete the Carolina University System."
 je_nc_university_system_progress_reason: "Tracks chartered campus progress toward a statewide university network."
