 je_nc_found_selected_ncat_status_loc: "Build #b North Carolina A&T#! in North Carolina."
 je_nc_found_selected_nccu_status_loc: "Build #b North Carolina Central University#! in North Carolina."
 je_nc_found_selected_pembroke_status_loc: "Build #b UNC Pembroke#! in North Carolina."
 je_nc_found_selected_uncg_status_loc: "Build #b UNC Greensboro#! in North Carolina."
 je_nc_found_selected_uncsa_status_loc: "Build #b UNC School of the Arts#! in North Carolina."
 je_nc_found_selected_university: "Found Chartered Universities"
 je_nc_found_selected_university_desc: "The Research Triangle is complete. Charter the remaining #b UNC System#! campuses — each pick queues construction automatically. Expand the University Board to charter two at once. Found #b 7#! for a mid-tier bonus; all #b 14#! complete the system."
 je_nc_found_selected_university_reason: "Finish chartered campus construction. Free slots let you charter the next campus."
 je_nc_found_selected_university_tt: "At least one chartered university campus has been founded in North Carolina"
 je_nc_found_selected_university_progress_status_loc: "A chartered campus is under construction."
 je_nc_found_selected_university_slots_status_loc: "Multiple chartered campuses are under construction."
 je_nc_found_selected_western_status_loc: "Build #b Western Carolina University#! in North Carolina."
 je_nc_found_selected_wilmington_status_loc: "Build #b UNC Wilmington#! in North Carolina."
 je_nc_found_selected_wssu_status_loc: "Build #b Winston-Salem State University#! in North Carolina."

 je_nc_high_point_furniture: "Furniture Capital of the World"
 je_nc_high_point_furniture_desc: "High Point sits amid hardwood forests and rail sidings perfect for chairs, tables, and case goods. Build furniture manufactories and logging camps until the world shops Carolina woodwork. Chartering High Point Furniture remains optional."
 je_nc_high_point_furniture_reason: "Shown after Tar Heel Legacy with Manufacturies. Activates once furniture factories are underway — finish with furniture and logging."
 je_nc_high_point_furniture_tt: "North Carolina has at least 5 levels of Furniture Manufactories"
 je_nc_high_point_logging_tt: "North Carolina has at least 5 levels of Logging Camps"
 je_nc_high_point_company_tt: "High Point Furniture has been established as a company"
 je_nc_high_point_start_tt: "North Carolina has at least 2 levels of Furniture Manufactories"
 je_nc_high_point_progress_status_loc: "Expand Furniture Manufactories and Logging Camps to level 5."

 je_nc_light_bodie_tt: "Bodie Island Lighthouse has been founded"

 je_nc_light_cape_fear_tt: "Cape Fear Lighthouse has been founded"

 je_nc_light_currituck_tt: "Currituck Beach Lighthouse has been founded"

 je_nc_light_lookout_tt: "Cape Lookout Lighthouse has been founded"

 je_nc_mill_village: "Mill Village and Plantation"
 je_nc_mill_village_desc: "Spindles and smoke stacks rise beside tobacco barns and cotton fields. Mill owners want company towns, cheap labor, and fall-line power; planters want the Piedmont kept for leaf and lint. Expand mills and plantations until the conflict can no longer be postponed."
 je_nc_mill_village_reason: "Unlocks after Piedmont Textiles or the New South bargain. Grow mills and plantations until New South industry and Old South agriculture collide."
 je_nc_mill_village_mills_status_loc: "The mills dominate the fall line. Expand tobacco or cotton plantations to force a settlement."
 je_nc_mill_village_mills_tt: "North Carolina has at least 8 levels of Textile Mills"
 je_nc_mill_village_plantations_tt: "North Carolina has at least 5 levels of Tobacco or Cotton Plantations"
 je_nc_mill_village_progress_status_loc: "Raise textile mills and keep tobacco or cotton strong enough that neither side can ignore the other."

 je_nc_naval_stores: "Naval Stores and the Dismal Canal"
 je_nc_naval_stores_desc: "Longleaf pines and cypress swamps made North Carolina the tar, pitch, and turpentine capital of the Atlantic. Expand logging camps and fund canal works through the Great Dismal Swamp so naval stores and timber can reach the coast."
 je_nc_naval_stores_reason: "Available while you own North Carolina. Grow logging and fund the Dismal Swamp Canal to restore Tar Heel naval-stores wealth."
 je_nc_naval_stores_canal_status_loc: "Logging and canal works are ready — finish the naval stores program."
 je_nc_naval_stores_canal_tt: "Funded the Great Dismal Swamp Canal works"
 je_nc_naval_stores_logging_status_loc: "The canal is funded. Expand #b Logging Camps#! in North Carolina to level 8."
 je_nc_naval_stores_logging_tt: "North Carolina has at least 8 levels of Logging Camps"
 je_nc_naval_stores_progress_status_loc: "Expand logging camps and open Decisions to #b Fund the Dismal Swamp Canal#!."

 je_nc_ncr_trunk: "North Carolina Railroad"
 je_nc_ncr_trunk_desc: "The great Piedmont trunk — over 220 miles from Goldsboro through Raleigh and Greensboro to Charlotte — will unite the state. Charter it via #b Decisions#! or a charter event, then expand #b Railways#! to level 13."
 je_nc_ncr_trunk_reason: "Charter the North Carolina Railroad trunk (Decision or event), then build Railways in North Carolina to level 13."
 je_nc_ncr_trunk_building_status_loc: "The North Carolina Railroad is chartered and under construction. Expand #b Railways#! in North Carolina to level 13."
 je_nc_ncr_trunk_charter_tt: "Chartered the North Carolina Railroad trunk"
 je_nc_ncr_trunk_progress_status_loc: "Open Decisions and take #b Charter North Carolina Railroad#! — or answer the matching charter event — to begin construction."
 je_nc_ncr_trunk_rails_tt: "North Carolina has at least 13 levels of Railways"

 je_nc_new_south: "Reconstruction to New South"
 je_nc_new_south_desc: "War's end leaves North Carolina between planter power and mill ambition. Fund freedmen's schools, grow spindles or the university corridor, then strike a New South bargain — literacy, industry, or a careful compromise — without rewriting national law."
 je_nc_new_south_reason: "Available from 1866 after Tar Heel Legacy. Fund schools and develop textiles or the Research Triangle, then choose a bargain outcome."
 je_nc_new_south_industry_tt: "Textile mills (level 3+), Piedmont Textiles complete, or Research Triangle complete"
 je_nc_new_south_progress_status_loc: "Open Decisions to #b Fund Freedmen's Schools#!. Grow Textile Mills to level 3, or complete Piedmont Textiles / Research Triangle."
 je_nc_new_south_ready_status_loc: "Schools and industry are ready — finish the New South journal."
 je_nc_new_south_schools_tt: "Funded freedmen's schools and literacy work"

 je_nc_outer_banks_hazards: "Graveyard of the Atlantic"
 je_nc_outer_banks_hazards_desc: "The lights stand, but Outer Banks weather does not rest. Nor'easters and wrecks still claw at Carolina ports — fund coastal reconstruction when storms hit, and keep the Banks interactive long after the Lighthouse Board's work is done."
 je_nc_outer_banks_hazards_reason: "Unlocks after the Outer Banks lighthouse program is complete. Storm and wreck pulses continue indefinitely."
 je_nc_outer_banks_hazards_ongoing_tt: "This journal stays open — Outer Banks hazards are an ongoing coastal system."
 je_nc_outer_banks_hazards_progress_status_loc: "Watch the Banks. When storms or wrecks strike, open #b Decisions#! to fund coastal reconstruction."
 je_nc_outer_banks_hazards_storm_status_loc: "Storm or wreck damage is active — fund #b Coastal Reconstruction#! from Decisions."
 je_nc_outer_banks_program: "Light the Outer Banks"
 je_nc_outer_banks_program_desc: "Old Baldy, Ocracoke, and Cape Hatteras already watch Carolina waters. Fund the Lighthouse Board, then raise Cape Lookout, Bodie Island, Currituck Beach, and Cape Fear — one beacon at a time — until the Graveyard of the Atlantic is fully lit."
 je_nc_outer_banks_program_reason: "Available from the start. Complete the Outer Banks light chain one lighthouse at a time."
 je_nc_outer_banks_program_active_status_loc: "Choose the next lighthouse from #b Decisions#! when its technology is researched — construction queues automatically."
 je_nc_outer_banks_program_building_status_loc: "A lighthouse is authorized and under construction. Finish it before choosing another."
 je_nc_outer_banks_program_progress_status_loc: "Fund the Lighthouse Board to begin choosing new Outer Banks lights."

 je_nc_piedmont_textiles: "Raise the Piedmont Mills"
 je_nc_piedmont_textiles_desc: "Along the fall line from Charlotte to Gastonia and Concord, water power and cheap cotton invite a New South experiment: mill villages spinning Southern fiber into cloth. Raise mills and secure cotton until the Piedmont hums with spindles. Chartering Cannon, Cone, or Burlington remains optional."
 je_nc_piedmont_textiles_reason: "Shown after Tar Heel Legacy with Atmospheric Engine. Activates once textile mills are underway — finish with mills and cotton."
 je_nc_piedmont_textiles_cotton_tt: "North Carolina has at least 3 levels of Cotton Plantations"
 je_nc_piedmont_textiles_mills_status_loc: "The mills stand ready. Expand cotton plantations to finish the Piedmont textile belt."
 je_nc_piedmont_textiles_mills_tt: "North Carolina has at least 5 levels of Textile Mills"
 je_nc_piedmont_textiles_cannon_tt: "Cannon Mills has been established as a company"
 je_nc_piedmont_textiles_cone_tt: "Cone Mills has been established as a company"
 je_nc_piedmont_textiles_burlington_tt: "Burlington Industries has been established as a company"
 je_nc_piedmont_textiles_start_tt: "North Carolina has at least 2 levels of Textile Mills"
 je_nc_piedmont_textiles_progress_status_loc: "Raise Textile Mills to level 5 and Cotton Plantations to level 3."

 je_nc_raleigh_gaston: "Raleigh & Gaston Railroad"
 je_nc_raleigh_gaston_desc: "A shorter inland spur of about 85 miles from Gaston on the Roanoke to the capital at Raleigh. Charter it via #b Decisions#! or a charter event, then expand #b Railways#! in North Carolina to level 10."
 je_nc_raleigh_gaston_reason: "Charter the smaller Raleigh & Gaston spur (Decision or event), then build Railways in North Carolina to level 10."
 je_nc_raleigh_gaston_building_status_loc: "The Raleigh & Gaston spur is chartered and under construction. Expand #b Railways#! in North Carolina to level 10."
 je_nc_raleigh_gaston_charter_tt: "Chartered the Raleigh and Gaston Railroad"
 je_nc_raleigh_gaston_progress_status_loc: "Open Decisions and take #b Charter Raleigh & Gaston Railroad#! — or answer the matching charter event — to begin construction."
 je_nc_raleigh_gaston_rails_tt: "North Carolina has at least 10 levels of Railways"

 je_nc_research_triangle: "Found the Research Triangle"
 je_nc_research_triangle_desc: "With the University of North Carolina already standing at Chapel Hill, planners envision a triangle of learning linking Raleigh and Durham. Found NC State University and Duke University in North Carolina to bind the Piedmont into America's next great research hub — then choose which campus expands the system next."
 je_nc_research_triangle_reason: "Unlocks after completing Tar Heel Legacy. Found NC State and Duke beside UNC to complete the Research Triangle."
 je_nc_research_triangle_tar_heel_tt: "Completed Tar Heel Legacy"
 je_nc_research_triangle_complete_status_loc: "All three universities stand ready. The Research Triangle can now be formally united."
 je_nc_research_triangle_complete_tt: "NC State University and Duke University have been built in North Carolina."
 je_nc_research_triangle_duke_tt: "Duke University has been founded in North Carolina"
 je_nc_research_triangle_duke_only_status_loc: "Duke University has been founded in Durham. NC State University in Raleigh remains to be built."
 je_nc_research_triangle_nc_state_only_status_loc: "NC State University has been founded in Raleigh. Duke University in Durham remains to be built."
 je_nc_research_triangle_ncsu_tt: "North Carolina State University has been founded in North Carolina"
 je_nc_research_triangle_progress_status_loc: "Build NC State and Duke from North Carolina's Special buildings (North Carolina Landmarks), or fund the plan for construction grants — unbuilt campuses also auto-queue after two months."
 je_nc_research_triangle_unc_tt: "The University of North Carolina stands in North Carolina"
 je_nc_research_triangle_waiting_status_loc: "Funding is secured — you can build NC State and Duke now. They will also auto-queue in about two months if you have not started them."

 je_nc_state_capitol: "Finish the State Capitol"
 je_nc_state_capitol_desc: "Work on a new Greek Revival capitol in Raleigh began in 1833 after fire destroyed the old State House. By 1836 the exterior walls are largely up — roughly two-fifths finished — with interiors still to come before the historical 1840 completion. Finish the building and give North Carolina a lasting seat of government."
 je_nc_state_capitol_reason: "Raleigh's new State Capitol is already rising in stone. Finish the interiors and dedicate a lasting seat of government for North Carolina."
 je_nc_state_capitol_tt: "The North Carolina State Capitol has been completed in Raleigh"

 je_nc_tar_heel_legacy: "Tar Heel Legacy"
 je_nc_tar_heel_legacy_desc: "North Carolina sits at a crossroads of the Old South and the rising industrial order. Tobacco fields blanket the Piedmont, pine forests feed naval stores, and Wilmington's harbor opens the state to the Atlantic world. Develop the Tar Heel State into a powerhouse of agriculture, timber, and trade."
 je_nc_tar_heel_legacy_reason: "Tobacco, timber, and naval stores can make North Carolina a New South powerhouse — if the fields and pine forests are developed in earnest."

 je_nc_tobacco_belt: "Tobacco Belt"
 je_nc_tobacco_belt_desc: "Brightleaf cured in Durham and Winston has made North Carolina the cigarette capital of America. Charter W. Duke, Sons & Co., R.J. Reynolds, and Liggett & Myers — use Decisions to sponsor their factories while expanding tobacco plantations along the Durham–Winston corridor."
 je_nc_tobacco_belt_reason: "Shown after Tar Heel Legacy with Corporate Charters. Activates so you can sponsor leaf houses; completes when Duke, Reynolds, and Liggett are founded and Tobacco Plantations reach level 8."
 je_nc_tobacco_belt_duke_tt: "W. Duke, Sons & Co. has been established as a company"
 je_nc_tobacco_belt_liggett_tt: "Liggett & Myers Tobacco Company has been established as a company"
 je_nc_tobacco_belt_plantations_tt: "North Carolina has at least 8 levels of Tobacco Plantations"
 je_nc_tobacco_belt_progress_status_loc: "Found Duke, Reynolds, and Liggett & Myers. Expand Tobacco Plantations to level 8. Open Decisions to sponsor Durham or Winston leaf."
 je_nc_tobacco_belt_reynolds_tt: "R.J. Reynolds Tobacco Company has been established as a company"

 je_nc_uni_progress_app_state_tt: "Appalachian State founded"
 je_nc_uni_progress_asheville_tt: "UNC Asheville founded"
 je_nc_uni_progress_charlotte_tt: "UNC Charlotte founded"
